<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meld Canvas MVP</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #0f0f0f;
      --grid: #2a2a2a;
      --panel: rgba(20, 20, 22, 0.96);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text: rgba(255, 255, 255, 0.96);
      --muted: rgba(255, 255, 255, 0.62);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
      --markdown: #3b82f6;
      --file: #10b981;
      --agent: #f59e0b;
      --note: #8b5cf6;
      --error: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
      --button-bg: rgba(0, 0, 0, 0.5);
      --button-hover: rgba(0, 0, 0, 0.7);
      --button-border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      touch-action: none;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .floating-panel {
      position: fixed;
      z-index: 40;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hidden {
      display: none !important;
    }

    #controls-layer {
      position: fixed;
      inset: 0;
      z-index: 25;
      pointer-events: none;
    }

    .card-controls {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      opacity: 0;
      transform: translateX(-4px) scale(0.96);
      transform-origin: top left;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .card-controls.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .card-action {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(30, 30, 30, 0.85);
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      font-size: 12px;
      line-height: 1;
      padding: 0;
    }

    .card-action:hover {
      background: rgba(52, 52, 52, 0.92);
      border-color: rgba(255, 255, 255, 0.18);
      transform: scale(1.06);
    }

    .card-action:active {
      transform: scale(1);
    }

    .card-action.is-paused {
      color: #93c5fd;
      border-color: rgba(147, 197, 253, 0.4);
    }

    .card-action.is-running {
      color: #fcd34d;
      border-color: rgba(252, 211, 77, 0.4);
    }

    .pipe-delete-button {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(18, 18, 20, 0.96);
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
      transition: background 0.2s ease, transform 0.2s ease;
      pointer-events: auto;
      z-index: 2;
    }

    .pipe-delete-button:hover {
      background: rgba(239, 68, 68, 0.96);
      transform: scale(1.08);
    }

    #topbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 45;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-button {
      min-width: 42px;
      height: 42px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(18, 18, 20, 0.82);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(12px);
    }

    .icon-button:hover {
      background: rgba(32, 32, 36, 0.92);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .status-disconnected {
      background: var(--error);
    }

    .status-connecting {
      background: var(--warn);
    }

    .status-connected {
      background: var(--ok);
    }

    .status-error {
      background: var(--error);
    }

    #settings-panel {
      top: 66px;
      right: 16px;
      width: 340px;
      padding: 14px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .panel-subtitle,
    .panel-status-text,
    .hint-text {
      font-size: 12px;
      color: var(--muted);
    }

    .panel-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .panel-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .panel-field input,
    .panel-field textarea,
    #editor-text,
    #chat-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(8, 8, 10, 0.82);
      color: var(--text);
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    .panel-field input:focus,
    .panel-field textarea:focus,
    #editor-text:focus,
    #chat-input:focus {
      border-color: rgba(96, 165, 250, 0.72);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .panel-actions,
    #editor-actions,
    #chat-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .panel-button {
      padding: 9px 12px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
    }

    .panel-button.primary {
      background: #ffffff;
      color: #111111;
      font-weight: 700;
    }

    .panel-button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .panel-button.warn {
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
    }

    #context-menu {
      min-width: 220px;
      padding: 8px;
      z-index: 50;
    }

    #context-menu .menu-title {
      padding: 8px 10px 6px;
      font-size: 12px;
      color: var(--muted);
    }

    #context-menu button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    #context-menu button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .menu-divider {
      height: 1px;
      margin: 8px 4px;
      background: rgba(255, 255, 255, 0.08);
    }

    #delete-card-button {
      color: #fca5a5;
    }

    #editor-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(0, 0, 0, 0.34);
    }

    #editor-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(520px, calc(100vw - 32px));
      min-height: 360px;
      padding: 14px;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
    }

    #editor-header span:last-child {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    #editor-text {
      flex: 1;
      min-height: 260px;
      resize: vertical;
      font: 14px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #chat-panel {
      top: 76px;
      right: 16px;
      width: min(420px, calc(100vw - 32px));
      height: min(620px, calc(100vh - 108px));
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 55;
    }

    #chat-header {
      padding: 14px 14px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #chat-header-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    #chat-header-title strong {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #chat-header-title span {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #chat-close {
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
    }

    #chat-history {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-empty {
      margin: auto 0;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .chat-message {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-message.user {
      align-self: flex-end;
      background: rgba(96, 165, 250, 0.2);
      color: rgba(219, 234, 254, 0.98);
      border: 1px solid rgba(96, 165, 250, 0.26);
    }

    .chat-message.assistant {
      align-self: flex-start;
      background: rgba(30, 41, 59, 0.94);
      color: rgba(255, 255, 255, 0.96);
    }

    .chat-message.meta {
      align-self: center;
      max-width: 100%;
      padding: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .chat-message.streaming {
      border: 1px dashed rgba(245, 158, 11, 0.4);
    }

    #chat-composer {
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat-input {
      min-height: 92px;
      max-height: 160px;
      resize: vertical;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #chat-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #hud {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(18, 18, 20, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      line-height: 1;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls-layer"></div>

  <div id="topbar">
    <button id="settings-toggle" class="icon-button" type="button" aria-label="Open gateway settings">
      <span id="settings-status-dot" class="status-dot status-disconnected"></span>
      <span>Gateway</span>
    </button>
  </div>

  <div id="settings-panel" class="floating-panel hidden">
    <div class="panel-header">
      <div>
        <div class="panel-title">OpenClaw Gateway</div>
        <div class="panel-subtitle">页面会优先读取 `meld-config.json` 自动连接</div>
      </div>
      <div class="panel-status">
        <span id="settings-panel-status-dot" class="status-dot status-disconnected"></span>
        <span id="settings-panel-status-text" class="panel-status-text">未连接</span>
      </div>
    </div>
    <label class="panel-field">
      <span>Gateway URL</span>
      <input id="gateway-url-input" type="text" spellcheck="false" placeholder="ws://127.0.0.1:18789" />
    </label>
    <label class="panel-field">
      <span>Gateway Token</span>
      <input id="gateway-token-input" type="password" spellcheck="false" placeholder="输入 token" />
    </label>
    <div class="hint-text" id="gateway-detail">等待连接 challenge</div>
    <div class="panel-actions" style="margin-top: 12px;">
      <button id="gateway-disconnect-button" class="panel-button secondary" type="button">断开</button>
      <button id="gateway-connect-button" class="panel-button primary" type="button">连接</button>
    </div>
  </div>

  <div id="context-menu" class="floating-panel hidden">
    <div id="context-menu-title" class="menu-title">创建卡片</div>
    <button type="button" data-action="create" data-card-type="markdown">新建 Markdown</button>
    <button type="button" data-action="create" data-card-type="file">新建 File</button>
    <button type="button" data-action="create" data-card-type="agent">新建 Agent</button>
    <button type="button" data-action="create" data-card-type="note">新建 Note</button>
    <div id="delete-divider" class="menu-divider hidden"></div>
    <button id="delete-card-button" class="hidden" type="button">删除卡片</button>
  </div>

  <div id="editor-overlay" class="hidden">
    <div id="editor-panel" class="floating-panel">
      <div id="editor-header">
        <span id="editor-title">编辑卡片</span>
        <span>Ctrl/Cmd + S 保存</span>
      </div>
      <textarea id="editor-text" spellcheck="false"></textarea>
      <div id="editor-actions">
        <button id="cancel-editor" class="panel-button secondary" type="button">取消</button>
        <button id="save-editor" class="panel-button primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="chat-panel" class="floating-panel hidden">
    <div id="chat-header">
      <div id="chat-header-title">
        <strong id="chat-title-text">Agent Chat</strong>
        <span id="chat-subtitle">sessionKey</span>
      </div>
      <button id="chat-close" type="button" aria-label="Close chat">×</button>
    </div>
    <div id="chat-history"></div>
    <div id="chat-composer">
      <textarea id="chat-input" spellcheck="false" placeholder="输入消息，Ctrl/Cmd + Enter 发送"></textarea>
      <div id="chat-footer">
        <div id="chat-hint" class="hint-text">未连接 Gateway</div>
        <div id="chat-actions">
          <button id="chat-stop" class="panel-button warn" type="button">停止</button>
          <button id="chat-send" class="panel-button primary" type="button">发送</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hud">缩放 100% · 0 张卡片 · 0 条管道</div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "meld-canvas-v4";
      const GATEWAY_SETTINGS_KEY = "meld-openclaw-gateway-v2";
      const GRID_SIZE = 60;
      const DEFAULT_CARD_SIZE = { w: 4, h: 5 };
      const DEFAULT_CARD_WIDTH = GRID_SIZE * DEFAULT_CARD_SIZE.w;
      const DEFAULT_CARD_HEIGHT = GRID_SIZE * DEFAULT_CARD_SIZE.h;
      const CARD_TYPES = ["markdown", "file", "agent", "note"];
      // 保留旧 port id 仅用于兼容已保存数据；新的连线锚点按卡片边缘交点动态计算。
      const CARD_PORTS = [
        { id: "top-left", side: "top", kind: "input", fx: 0.22, fy: 0 },
        { id: "top-center", side: "top", kind: "input", fx: 0.5, fy: 0 },
        { id: "top-right", side: "top", kind: "input", fx: 0.78, fy: 0 },
        { id: "left", side: "left", kind: "input", fx: 0, fy: 0.5 },
        { id: "bottom-left", side: "bottom", kind: "output", fx: 0.22, fy: 1 },
        { id: "bottom-center", side: "bottom", kind: "output", fx: 0.5, fy: 1 },
        { id: "bottom-right", side: "bottom", kind: "output", fx: 0.78, fy: 1 },
        { id: "right", side: "right", kind: "output", fx: 1, fy: 0.5 },
      ];
      const PIPE_ANCHOR_IDS = new Set([...CARD_PORTS.map((port) => port.id), "top", "right", "bottom", "left"]);
      const MIN_ZOOM = 0.25;
      const MAX_ZOOM = 3;
      const LONG_PRESS_MS = 460;
      const MOVE_THRESHOLD = 8;
      const DOUBLE_TAP_MS = 320;
      const DOUBLE_TAP_DISTANCE = 24;
      const PIPE_SELECTION_THRESHOLD = 15;
      const CARD_EDGE_CONNECT_BAND = 30;
      const CARD_CENTER_EDIT_INSET = 30;
      const CARD_SNAP_BAND = 40;
      const CARD_BAND_HEIGHT = 4;
      const CARD_CONTROL_SIZE = 24;
      const CARD_CONTROL_GAP = 6;
      const CARD_CONTROL_OFFSET = 10;
      const CARD_BODY_FONT_SIZE = 13;
      const CARD_META_FONT_SIZE = 11;
      const MAX_FLOW_HOPS = 24;
      const ACTIVE_MS = 1800;
      const CARD_COLORS = {
        markdown: "#3b82f6",
        file: "#10b981",
        agent: "#f59e0b",
        note: "#8b5cf6",
      };
      const TYPE_LABELS = {
        markdown: "Markdown",
        file: "File",
        agent: "Agent",
        note: "Note",
      };
      const DEFAULT_CONTENT = {
        markdown: "# 需求\n\n在这里写下任务说明。",
        file: "",
        agent: "你是一个画布上的 agent。请基于上游 context 给出可直接传递给下游卡片的结果。",
        note: "",
      };
      const GATEWAY_STATUS_LABELS = {
        disconnected: "未连接",
        connecting: "连接中",
        connected: "已连接",
        error: "连接异常",
      };

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const controlsLayer = document.getElementById("controls-layer");
      const settingsToggle = document.getElementById("settings-toggle");
      const settingsStatusDot = document.getElementById("settings-status-dot");
      const settingsPanel = document.getElementById("settings-panel");
      const settingsPanelStatusDot = document.getElementById("settings-panel-status-dot");
      const settingsPanelStatusText = document.getElementById("settings-panel-status-text");
      const gatewayDetail = document.getElementById("gateway-detail");
      const gatewayUrlInput = document.getElementById("gateway-url-input");
      const gatewayTokenInput = document.getElementById("gateway-token-input");
      const gatewayConnectButton = document.getElementById("gateway-connect-button");
      const gatewayDisconnectButton = document.getElementById("gateway-disconnect-button");
      const contextMenu = document.getElementById("context-menu");
      const contextMenuTitle = document.getElementById("context-menu-title");
      const deleteDivider = document.getElementById("delete-divider");
      const deleteCardButton = document.getElementById("delete-card-button");
      const editorOverlay = document.getElementById("editor-overlay");
      const editorTitle = document.getElementById("editor-title");
      const editorText = document.getElementById("editor-text");
      const saveEditorButton = document.getElementById("save-editor");
      const cancelEditorButton = document.getElementById("cancel-editor");
      const chatPanel = document.getElementById("chat-panel");
      const chatTitleText = document.getElementById("chat-title-text");
      const chatSubtitle = document.getElementById("chat-subtitle");
      const chatHistory = document.getElementById("chat-history");
      const chatInput = document.getElementById("chat-input");
      const chatHint = document.getElementById("chat-hint");
      const chatSendButton = document.getElementById("chat-send");
      const chatStopButton = document.getElementById("chat-stop");
      const chatCloseButton = document.getElementById("chat-close");
      const hud = document.getElementById("hud");
      const pipeDeleteButton = document.createElement("button");

      const viewport = {
        width: window.innerWidth,
        height: window.innerHeight,
        dpr: window.devicePixelRatio || 1,
      };

      let state = loadState();
      let selectedCardId = null;
      let selectedPipeId = null;
      let chatCardId = null;
      let editorCardId = null;
      let contextMenuState = null;
      let saveTimer = null;
      let lastFrameTime = performance.now();
      let hoveredCardId = null;
      let hoveredControlCardId = null;
      const tapState = {
        cardId: null,
        time: 0,
        x: 0,
        y: 0,
      };

      const controlElements = new Map();
      const pipeActiveUntil = new Map();
      const activePointers = new Map();
      const agentRuntime = new Map();
      // Gateway 连接和请求都集中在这里，便于处理 challenge / response / chat event。
      const gateway = {
        status: "disconnected",
        socket: null,
        pending: new Map(),
        detail: "等待连接 challenge",
        settings: loadGatewaySettings(),
      };

      const interaction = {
        mode: "idle",
        cardId: null,
        dragOffsetX: 0,
        dragOffsetY: 0,
        startScreenX: 0,
        startScreenY: 0,
        startCameraX: 0,
        startCameraY: 0,
        connectFromCardId: null,
        connectFromPortId: null,
        connectPointerX: 0,
        connectPointerY: 0,
        connectTargetCardId: null,
        connectTargetPortId: null,
        pinchStartZoom: 1,
        pinchStartDistance: 0,
        pinchWorldCenter: { x: 0, y: 0 },
        longPressTimer: null,
        longPressWorld: null,
        pipeId: null,
        moved: false,
      };

      init();

      function init() {
        pipeDeleteButton.type = "button";
        pipeDeleteButton.className = "pipe-delete-button hidden";
        pipeDeleteButton.textContent = "×";
        pipeDeleteButton.setAttribute("aria-label", "删除连接线");
        controlsLayer.appendChild(pipeDeleteButton);
        restoreGatewayInputs();
        ensureStateIntegrity();
        bindEvents();
        resizeCanvas();
        requestAnimationFrame(frame);
        loadAutoGatewayConfig();
        updateGatewayUI();
        updateHUD();
        renderChatPanel();
      }

      function createDefaultState() {
        return {
          version: 5,
          camera: {
            x: 0,
            y: 0,
            zoom: 1,
          },
          cards: [],
          pipes: [],
        };
      }

      function ensureStateIntegrity() {
        state.cards.forEach((card) => {
          if (card.type === "agent") {
            ensureAgentRuntime(card.id);
          }
        });
      }

      function normalizeState(raw) {
        const fallback = createDefaultState();
        if (!raw || typeof raw !== "object") {
          return fallback;
        }

        const cards = Array.isArray(raw.cards)
          ? raw.cards
              .filter((card) => card && typeof card === "object")
              .map((card) => {
                const type = CARD_TYPES.includes(card.type) ? card.type : "markdown";
                const id = typeof card.id === "string" ? card.id : createId();
                const x = Number.isFinite(card.x) ? card.x : Number.isFinite(card.position?.x) ? card.position.x : 0;
                const y = Number.isFinite(card.y) ? card.y : Number.isFinite(card.position?.y) ? card.position.y : 0;
                const w = Number.isFinite(card.w) ? card.w : Number.isFinite(card.size?.w) ? card.size.w : DEFAULT_CARD_SIZE.w;
                const h = Number.isFinite(card.h) ? card.h : Number.isFinite(card.size?.h) ? card.size.h : DEFAULT_CARD_SIZE.h;
                const title = typeof card.title === "string" && card.title.trim() ? card.title : card.meta?.title || TYPE_LABELS[type];
                const content = typeof card.content === "string" ? card.content : DEFAULT_CONTENT[type];
                const output =
                  type === "agent"
                    ? typeof card.output === "string"
                      ? card.output
                      : typeof card.meta?.lastOutput === "string"
                        ? card.meta.lastOutput
                        : ""
                    : "";
                const status =
                  type === "agent"
                    ? typeof card.status === "string"
                      ? card.status
                      : typeof card.meta?.status === "string"
                        ? card.meta.status
                        : "idle"
                    : "idle";
                const sessionKey =
                  type === "agent"
                    ? typeof card.sessionKey === "string" && card.sessionKey.trim()
                      ? card.sessionKey
                      : typeof card.meta?.sessionKey === "string" && card.meta.sessionKey.trim()
                        ? card.meta.sessionKey
                        : buildSessionKey(id)
                    : "";
                const messages =
                  type === "agent" && Array.isArray(card.messages)
                    ? card.messages
                        .filter((item) => item && typeof item === "object")
                        .map((item) => ({
                          id: typeof item.id === "string" ? item.id : createId(),
                          role: item.role === "assistant" || item.role === "user" ? item.role : "meta",
                          text: typeof item.text === "string" ? item.text : "",
                          createdAt: typeof item.createdAt === "string" ? item.createdAt : new Date().toISOString(),
                        }))
                    : [];
                return {
                  id,
                  type,
                  title,
                  x,
                  y,
                  w,
                  h,
                  content,
                  output,
                  status: normalizeAgentStatus(status),
                  sessionKey,
                  messages,
                  updatedAt: typeof card.updatedAt === "string" ? card.updatedAt : new Date().toISOString(),
                  activeUntil: 0,
                };
              })
          : [];

        const cardIds = new Set(cards.map((card) => card.id));
        const pipes = Array.isArray(raw.pipes)
          ? raw.pipes
              .filter((pipe) => pipe && typeof pipe === "object")
              .filter((pipe) => cardIds.has(pipe.from) && cardIds.has(pipe.to))
              .map((pipe) => ({
                id: typeof pipe.id === "string" ? pipe.id : createId(),
                from: pipe.from,
                fromPort: PIPE_ANCHOR_IDS.has(pipe.fromPort) ? pipe.fromPort : "right",
                to: pipe.to,
                toPort: PIPE_ANCHOR_IDS.has(pipe.toPort) ? pipe.toPort : "left",
              }))
          : [];

        return {
          version: 5,
          camera: {
            x: Number.isFinite(raw.camera?.x) ? raw.camera.x : fallback.camera.x,
            y: Number.isFinite(raw.camera?.y) ? raw.camera.y : fallback.camera.y,
            zoom: Number.isFinite(raw.camera?.zoom) ? clamp(raw.camera.zoom, MIN_ZOOM, MAX_ZOOM) : 1,
          },
          cards,
          pipes,
        };
      }

      function loadState() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (!stored) {
            return createDefaultState();
          }
          return normalizeState(JSON.parse(stored));
        } catch (error) {
          console.warn("Failed to load canvas state:", error);
          return createDefaultState();
        }
      }

      function scheduleSave() {
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveState, 120);
      }

      function saveState() {
        try {
          // localStorage 只保存可序列化的画布状态，临时流式态放在内存里。
          const payload = {
            version: 5,
            camera: state.camera,
            cards: state.cards.map((card) => ({
              id: card.id,
              type: card.type,
              title: card.title,
              x: card.x,
              y: card.y,
              w: card.w,
              h: card.h,
              content: card.content,
              output: card.output,
              status: card.type === "agent" ? card.status : "idle",
              sessionKey: card.type === "agent" ? card.sessionKey : "",
              messages: card.type === "agent" ? card.messages.slice(-40) : [],
              updatedAt: card.updatedAt,
            })),
            pipes: state.pipes.map((pipe) => ({
              id: pipe.id,
              from: pipe.from,
              fromPort: pipe.fromPort,
              to: pipe.to,
              toPort: pipe.toPort,
            })),
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        } catch (error) {
          console.warn("Failed to save canvas state:", error);
        }
      }

      function loadGatewaySettings() {
        try {
          const stored = localStorage.getItem(GATEWAY_SETTINGS_KEY);
          if (!stored) {
            return { url: "", token: "" };
          }
          const parsed = JSON.parse(stored);
          return {
            url: typeof parsed.url === "string" ? parsed.url : "",
            token: typeof parsed.token === "string" ? parsed.token : "",
          };
        } catch (error) {
          console.warn("Failed to load gateway settings:", error);
          return { url: "", token: "" };
        }
      }

      function saveGatewaySettings() {
        gateway.settings.url = gatewayUrlInput.value.trim();
        gateway.settings.token = gatewayTokenInput.value.trim();
        localStorage.setItem(GATEWAY_SETTINGS_KEY, JSON.stringify(gateway.settings));
      }

      function restoreGatewayInputs() {
        gatewayUrlInput.value = gateway.settings.url || "";
        gatewayTokenInput.value = gateway.settings.token || "";
      }

      async function loadAutoGatewayConfig() {
        try {
          const response = await fetch("meld-config.json", { cache: "no-store" });
          if (!response.ok) {
            return;
          }
          const data = await response.json();
          const configUrl = typeof data.gatewayUrl === "string" ? data.gatewayUrl.trim() : "";
          const configToken = typeof data.gatewayToken === "string" ? data.gatewayToken.trim() : "";
          if (configUrl) {
            gatewayUrlInput.value = configUrl;
          }
          if (configToken) {
            gatewayTokenInput.value = configToken;
          }
          if (configUrl || configToken) {
            saveGatewaySettings();
          }
          if (configUrl && configToken) {
            connectGateway();
          }
        } catch (error) {
          console.debug("No auto config loaded:", error);
        }
      }

      function normalizeAgentStatus(status) {
        if (status === "running" || status === "paused" || status === "error") {
          return status;
        }
        return "idle";
      }

      function bindEvents() {
        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("keydown", onWindowKeyDown);
        window.addEventListener("pointerdown", onGlobalPointerDown, true);
        window.addEventListener("beforeunload", () => {
          disconnectGateway();
        });

        canvas.addEventListener("contextmenu", onCanvasContextMenu);
        canvas.addEventListener("pointerdown", onCanvasPointerDown);
        canvas.addEventListener("pointermove", onCanvasPointerMove);
        canvas.addEventListener("pointerup", onCanvasPointerUp);
        canvas.addEventListener("pointercancel", onCanvasPointerUp);
        canvas.addEventListener("pointerleave", onCanvasPointerLeave);
        canvas.addEventListener("wheel", onCanvasWheel, { passive: false });

        controlsLayer.addEventListener("click", onCardControlClick);
        controlsLayer.addEventListener("pointerover", onControlsPointerOver);
        controlsLayer.addEventListener("pointerout", onControlsPointerOut);
        pipeDeleteButton.addEventListener("click", (event) => {
          event.stopPropagation();
          if (selectedPipeId) {
            deletePipe(selectedPipeId);
          }
        });

        contextMenu.addEventListener("click", onContextMenuClick);
        deleteCardButton.addEventListener("click", () => {
          if (!contextMenuState?.cardId) {
            return;
          }
          deleteCard(contextMenuState.cardId);
          hideContextMenu();
        });

        settingsToggle.addEventListener("click", () => {
          settingsPanel.classList.toggle("hidden");
        });
        gatewayConnectButton.addEventListener("click", () => {
          connectGateway();
        });
        gatewayDisconnectButton.addEventListener("click", () => {
          disconnectGateway();
        });
        gatewayUrlInput.addEventListener("change", saveGatewaySettings);
        gatewayTokenInput.addEventListener("change", saveGatewaySettings);

        saveEditorButton.addEventListener("click", saveEditor);
        cancelEditorButton.addEventListener("click", closeEditor);
        editorOverlay.addEventListener("pointerdown", (event) => {
          if (event.target === editorOverlay) {
            closeEditor();
          }
        });

        chatSendButton.addEventListener("click", sendChatFromPanel);
        chatStopButton.addEventListener("click", stopChatRun);
        chatCloseButton.addEventListener("click", closeChatPanel);
      }

      function resizeCanvas() {
        viewport.width = window.innerWidth;
        viewport.height = window.innerHeight;
        viewport.dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(viewport.width * viewport.dpr);
        canvas.height = Math.floor(viewport.height * viewport.dpr);
        ctx.setTransform(viewport.dpr, 0, 0, viewport.dpr, 0, 0);
      }

      function onWindowKeyDown(event) {
        const isMetaSave = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s";
        if (isMetaSave && !editorOverlay.classList.contains("hidden")) {
          event.preventDefault();
          saveEditor();
          return;
        }

        if (chatCardId && (event.metaKey || event.ctrlKey) && event.key === "Enter") {
          if (document.activeElement === chatInput) {
            event.preventDefault();
            sendChatFromPanel();
          }
        }

        if (
          selectedPipeId &&
          (event.key === "Delete" || event.key === "Backspace") &&
          !isTextInputTarget(document.activeElement)
        ) {
          event.preventDefault();
          deletePipe(selectedPipeId);
          return;
        }

        if (event.key === "Escape") {
          closeEditor();
          closeChatPanel();
          hideContextMenu();
          settingsPanel.classList.add("hidden");
          clearSelection();
        }
      }

      function onGlobalPointerDown(event) {
        const target = event.target;
        const clickedInsideMenu = contextMenu.contains(target);
        const clickedSettings = settingsPanel.contains(target) || settingsToggle.contains(target);
        const clickedChat = chatPanel.contains(target);
        const clickedEditor = editorOverlay.contains(target);
        const clickedControl = controlsLayer.contains(target);

        if (!clickedInsideMenu) {
          hideContextMenu();
        }
        if (!clickedSettings && !clickedControl && !clickedChat && !clickedEditor) {
          settingsPanel.classList.add("hidden");
        }
      }

      function onCanvasContextMenu(event) {
        event.preventDefault();
        const world = screenToWorld(event.clientX, event.clientY);
        const hit = getCardAtScreenPoint(event.clientX, event.clientY);
        openContextMenu(event.clientX, event.clientY, world.x, world.y, hit ? hit.id : null);
      }

      function onCanvasPointerDown(event) {
        if (event.pointerType === "mouse" && event.button === 2) {
          return;
        }

        // 统一用 Pointer Events 同时覆盖鼠标、触摸拖拽和双指缩放。
        activePointers.set(event.pointerId, {
          id: event.pointerId,
          type: event.pointerType,
          x: event.clientX,
          y: event.clientY,
          startX: event.clientX,
          startY: event.clientY,
        });

        canvas.setPointerCapture(event.pointerId);
        interaction.moved = false;
        cancelLongPress();

        if (activePointers.size === 2) {
          hoveredCardId = null;
          beginPinch();
          return;
        }

        const world = screenToWorld(event.clientX, event.clientY);
        const card = getCardAtScreenPoint(event.clientX, event.clientY);
        const pipeHit = card ? null : getTopmostPipeHit(event.clientX, event.clientY);

        interaction.startScreenX = event.clientX;
        interaction.startScreenY = event.clientY;
        interaction.startCameraX = state.camera.x;
        interaction.startCameraY = state.camera.y;

        if (card) {
          selectCard(card.id);
          hoveredCardId = card.id;
          bringCardToFront(card.id);
          if (isPointInCardEdgeBand(card, event.clientX, event.clientY, CARD_EDGE_CONNECT_BAND)) {
            beginConnection(card.id, getClosestCardEdgeSide(card, event.clientX, event.clientY), event.clientX, event.clientY, "edge-connect");
            return;
          }

          interaction.mode = "drag-card";
          interaction.cardId = card.id;
          interaction.dragOffsetX = world.x - card.x;
          interaction.dragOffsetY = world.y - card.y;
          return;
        }

        if (pipeHit) {
          selectPipe(pipeHit.id);
          hoveredCardId = null;
          interaction.mode = "pipe-select";
          interaction.pipeId = pipeHit.id;
          if (event.pointerType === "touch") {
            interaction.longPressTimer = window.setTimeout(() => {
              selectPipe(pipeHit.id);
              if (window.confirm("删除这条连接线？")) {
                deletePipe(pipeHit.id);
              }
              interaction.mode = "idle";
              interaction.pipeId = null;
              interaction.moved = true;
            }, LONG_PRESS_MS);
          }
          return;
        }

        if (event.pointerType === "touch") {
          interaction.longPressWorld = world;
          interaction.longPressTimer = window.setTimeout(() => {
            openContextMenu(event.clientX, event.clientY, world.x, world.y, null);
            interaction.mode = "idle";
          }, LONG_PRESS_MS);
        }

        hoveredCardId = null;
        interaction.mode = "pan";
      }

      function onCanvasPointerMove(event) {
        const pointer = activePointers.get(event.pointerId);
        if (pointer) {
          pointer.x = event.clientX;
          pointer.y = event.clientY;
        }

        if (interaction.mode === "edge-connect" || interaction.mode === "connect") {
          interaction.connectPointerX = event.clientX;
          interaction.connectPointerY = event.clientY;
          const snapTarget = getSnapCardTarget(event.clientX, event.clientY, interaction.connectFromCardId);
          interaction.connectTargetCardId = snapTarget?.card.id || null;
          interaction.connectTargetPortId = snapTarget?.side || null;
          hoveredCardId = snapTarget?.card.id || getCardAtScreenPoint(event.clientX, event.clientY)?.id || interaction.connectFromCardId || null;
        } else if (event.pointerType === "mouse") {
          hoveredCardId = getCardAtScreenPoint(event.clientX, event.clientY)?.id || null;
        }

        if (Math.abs(event.clientX - interaction.startScreenX) > MOVE_THRESHOLD || Math.abs(event.clientY - interaction.startScreenY) > MOVE_THRESHOLD) {
          interaction.moved = true;
          cancelLongPress();
        }

        if (interaction.mode === "pinch") {
          updatePinch();
          return;
        }

        if (interaction.mode === "drag-card" && interaction.cardId) {
          const card = getCard(interaction.cardId);
          if (!card) {
            return;
          }
          const world = screenToWorld(event.clientX, event.clientY);
          card.x = world.x - interaction.dragOffsetX;
          card.y = world.y - interaction.dragOffsetY;
          card.updatedAt = new Date().toISOString();
          scheduleSave();
          return;
        }

        if (interaction.mode === "pipe-select") {
          if (interaction.moved) {
            interaction.mode = "pan";
          }
          return;
        }

        if (interaction.mode === "edge-connect") {
          if (interaction.moved) {
            interaction.mode = "connect";
          }
          return;
        }

        if (interaction.mode === "pan") {
          const dx = event.clientX - interaction.startScreenX;
          const dy = event.clientY - interaction.startScreenY;
          state.camera.x = interaction.startCameraX - dx / state.camera.zoom;
          state.camera.y = interaction.startCameraY - dy / state.camera.zoom;
          scheduleSave();
          return;
        }

        if (interaction.mode === "connect") {
          interaction.connectPointerX = event.clientX;
          interaction.connectPointerY = event.clientY;
        }
      }

      function onCanvasPointerUp(event) {
        const pointer = activePointers.get(event.pointerId);
        activePointers.delete(event.pointerId);
        cancelLongPress();

        if (interaction.mode === "pinch") {
          if (activePointers.size >= 2) {
            beginPinch();
          } else {
            interaction.mode = "idle";
          }
          return;
        }

        if (interaction.mode === "drag-card" && interaction.cardId) {
          const card = getCard(interaction.cardId);
          if (card) {
            card.x = snap(card.x);
            card.y = snap(card.y);
            card.updatedAt = new Date().toISOString();
            scheduleSave();
          }
        }

        if ((interaction.mode === "connect" || interaction.mode === "edge-connect") && interaction.connectFromCardId) {
          const targetHit = getSnapCardTarget(event.clientX, event.clientY, interaction.connectFromCardId);
          if (targetHit) {
            createPipe(interaction.connectFromCardId, interaction.connectFromPortId || "right", targetHit.card.id, targetHit.side);
          }
        }

        if (!interaction.moved && pointer) {
          const hitCard = getCardAtScreenPoint(pointer.x, pointer.y);
          const hitPipe = hitCard ? null : getTopmostPipeHit(pointer.x, pointer.y);
          if (hitCard) {
            selectCard(hitCard.id);
            hoveredCardId = hitCard.id;
            handleCardTap(hitCard, pointer.x, pointer.y);
          } else if (hitPipe) {
            selectPipe(hitPipe.id);
            hoveredCardId = null;
          } else {
            clearSelection();
            clearTapState();
            hoveredCardId = null;
          }
        }

        interaction.mode = activePointers.size ? "pan" : "idle";
        interaction.cardId = null;
        interaction.connectFromCardId = null;
        interaction.connectFromPortId = null;
        interaction.connectTargetCardId = null;
        interaction.connectTargetPortId = null;
        interaction.pipeId = null;
      }

      function onCanvasPointerLeave(event) {
        if (event.pointerType === "mouse" && interaction.mode === "idle") {
          hoveredCardId = null;
        }
      }

      function onCanvasWheel(event) {
        event.preventDefault();
        const zoomFactor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
        const nextZoom = clamp(state.camera.zoom * zoomFactor, MIN_ZOOM, MAX_ZOOM);
        zoomAtPoint(event.clientX, event.clientY, nextZoom);
      }

      function beginPinch() {
        const touches = Array.from(activePointers.values()).slice(0, 2);
        if (touches.length < 2) {
          return;
        }
        const centerX = (touches[0].x + touches[1].x) / 2;
        const centerY = (touches[0].y + touches[1].y) / 2;
        interaction.mode = "pinch";
        interaction.pinchStartZoom = state.camera.zoom;
        interaction.pinchStartDistance = distance(touches[0].x, touches[0].y, touches[1].x, touches[1].y);
        interaction.pinchWorldCenter = screenToWorld(centerX, centerY);
        cancelLongPress();
      }

      function updatePinch() {
        const touches = Array.from(activePointers.values()).slice(0, 2);
        if (touches.length < 2) {
          return;
        }
        const centerX = (touches[0].x + touches[1].x) / 2;
        const centerY = (touches[0].y + touches[1].y) / 2;
        const currentDistance = distance(touches[0].x, touches[0].y, touches[1].x, touches[1].y);
        if (!interaction.pinchStartDistance) {
          return;
        }
        const nextZoom = clamp(interaction.pinchStartZoom * (currentDistance / interaction.pinchStartDistance), MIN_ZOOM, MAX_ZOOM);
        state.camera.zoom = nextZoom;
        state.camera.x = interaction.pinchWorldCenter.x - (centerX - viewport.width / 2) / nextZoom;
        state.camera.y = interaction.pinchWorldCenter.y - (centerY - viewport.height / 2) / nextZoom;
        scheduleSave();
      }

      function cancelLongPress() {
        if (interaction.longPressTimer) {
          window.clearTimeout(interaction.longPressTimer);
          interaction.longPressTimer = null;
        }
      }

      function onCardControlClick(event) {
        const button = event.target.closest("[data-action]");
        if (!button) {
          return;
        }
        const cardId = button.dataset.cardId;
        const action = button.dataset.action;
        if (!cardId || !action) {
          return;
        }
        event.stopPropagation();
        selectCard(cardId);

        if (action === "edit") {
          openEditor(cardId);
          return;
        }
        if (action === "run") {
          const card = getCard(cardId);
          if (!card) {
            return;
          }
          if (card.type === "agent") {
            resumeAndRunAgent(cardId, "manual-run");
            return;
          }
          if ((card.type === "markdown" || card.type === "file") && hasDownstreamPipes(card.id)) {
            markCardActive(card.id);
            propagateFromCard(card.id, { reason: "manual-trigger", hops: 0, flowId: createId() });
          }
          return;
        }
        if (action === "pause-toggle") {
          const card = getCard(cardId);
          if (!card || card.type !== "agent") {
            return;
          }
          if (card.status === "paused") {
            resumeAndRunAgent(cardId, "manual-resume");
          } else if (card.status === "running") {
            pauseAgent(cardId);
          }
          return;
        }
        if (action === "chat") {
          openChatPanel(cardId);
          return;
        }
        if (action === "clear") {
          clearNoteCard(cardId);
        }
      }

      function onControlsPointerOver(event) {
        const group = event.target.closest(".card-controls");
        hoveredControlCardId = group?.dataset.cardId || null;
      }

      function onControlsPointerOut(event) {
        const currentGroup = event.target.closest(".card-controls");
        const nextGroup = event.relatedTarget?.closest ? event.relatedTarget.closest(".card-controls") : null;
        if (currentGroup && currentGroup !== nextGroup) {
          hoveredControlCardId = nextGroup?.dataset.cardId || null;
        }
      }

      function onContextMenuClick(event) {
        const button = event.target.closest("[data-action='create']");
        if (!button) {
          return;
        }
        const type = button.dataset.cardType;
        if (!CARD_TYPES.includes(type)) {
          return;
        }
        createCard(type, contextMenuState?.worldX || state.camera.x, contextMenuState?.worldY || state.camera.y);
        hideContextMenu();
      }

      function openContextMenu(screenX, screenY, worldX, worldY, cardId) {
        contextMenuState = { screenX, screenY, worldX, worldY, cardId };
        contextMenu.style.left = `${Math.min(screenX, viewport.width - 236)}px`;
        contextMenu.style.top = `${Math.min(screenY, viewport.height - 240)}px`;
        contextMenuTitle.textContent = cardId ? "卡片操作 / 创建卡片" : "创建卡片";
        deleteDivider.classList.toggle("hidden", !cardId);
        deleteCardButton.classList.toggle("hidden", !cardId);
        contextMenu.classList.remove("hidden");
      }

      function hideContextMenu() {
        contextMenu.classList.add("hidden");
        contextMenuState = null;
      }

      function openEditor(cardId) {
        const card = getCard(cardId);
        if (!card || card.type === "note") {
          return;
        }
        selectCard(cardId);
        editorCardId = cardId;
        editorTitle.textContent = card.type === "agent" ? "编辑 Agent 指令" : `编辑 ${TYPE_LABELS[card.type]} 内容`;
        editorText.value = card.content;
        editorOverlay.classList.remove("hidden");
        window.setTimeout(() => editorText.focus(), 0);
      }

      function closeEditor() {
        editorOverlay.classList.add("hidden");
        editorCardId = null;
      }

      function saveEditor() {
        if (!editorCardId) {
          return;
        }
        const card = getCard(editorCardId);
        if (!card) {
          closeEditor();
          return;
        }
        const nextContent = editorText.value;
        if (card.content !== nextContent) {
          card.content = nextContent;
          card.updatedAt = new Date().toISOString();
          markCardActive(card.id);
          scheduleSave();
          if ((card.type === "markdown" || card.type === "file") && hasDownstreamPipes(card.id)) {
            propagateFromCard(card.id, { reason: "trigger-saved", hops: 0, flowId: createId() });
          }
        }
        closeEditor();
      }

      function openChatPanel(cardId) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        selectCard(cardId);
        chatCardId = cardId;
        chatPanel.classList.remove("hidden");
        renderChatPanel();
      }

      function closeChatPanel() {
        chatPanel.classList.add("hidden");
        chatCardId = null;
      }

      function renderChatPanel() {
        if (!chatCardId) {
          return;
        }
        const card = getCard(chatCardId);
        if (!card || card.type !== "agent") {
          closeChatPanel();
          return;
        }
        const runtime = ensureAgentRuntime(card.id);
        chatTitleText.textContent = "Agent Chat";
        chatSubtitle.textContent = normalizeSessionKey(card.sessionKey);
        chatHint.textContent = gateway.status === "connected" ? `${GATEWAY_STATUS_LABELS[gateway.status]} · ${card.status}` : GATEWAY_STATUS_LABELS[gateway.status];
        chatHistory.innerHTML = "";

        const items = [...card.messages];
        if (runtime.streamingText) {
          items.push({
            id: "streaming",
            role: "assistant",
            text: runtime.streamingText,
            createdAt: new Date().toISOString(),
            streaming: true,
          });
        }

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "chat-empty";
          empty.textContent = "还没有消息。可直接发送消息，或点击卡片上的运行按钮走自动管道。";
          chatHistory.appendChild(empty);
        } else {
          items.forEach((item) => {
            const node = document.createElement("div");
            const role = item.role === "assistant" || item.role === "user" ? item.role : "meta";
            node.className = `chat-message ${role}${item.streaming ? " streaming" : ""}`;
            node.textContent = item.text;
            chatHistory.appendChild(node);
          });
          chatHistory.scrollTop = chatHistory.scrollHeight;
        }
      }

      async function sendChatFromPanel() {
        if (!chatCardId) {
          return;
        }
        const card = getCard(chatCardId);
        if (!card || card.type !== "agent") {
          return;
        }
        const message = chatInput.value.trim();
        if (!message) {
          return;
        }
        chatInput.value = "";
        pushAgentMessage(card.id, "user", message);
        await sendAgentMessage(card.id, message, { reason: "chat-panel" });
      }

      function stopChatRun() {
        if (!chatCardId) {
          return;
        }
        abortAgentRun(chatCardId, "已从聊天面板停止当前运行。");
      }

      function createCard(type, worldX, worldY) {
        const id = createId();
        const card = {
          id,
          type,
          title: buildCardTitle(type),
          x: snap(worldX),
          y: snap(worldY),
          w: DEFAULT_CARD_SIZE.w,
          h: DEFAULT_CARD_SIZE.h,
          content: DEFAULT_CONTENT[type],
          output: "",
          status: type === "agent" ? "idle" : "idle",
          sessionKey: type === "agent" ? buildSessionKey(id) : "",
          messages: [],
          updatedAt: new Date().toISOString(),
          activeUntil: 0,
        };
        if (type === "note" || type === "file") {
          card.content = "";
        }
        state.cards.push(card);
        if (type === "agent") {
          ensureAgentRuntime(card.id);
        }
        selectCard(card.id);
        scheduleSave();
        return card;
      }

      function deleteCard(cardId) {
        const removedPipeIds = new Set(
          state.pipes.filter((pipe) => pipe.from === cardId || pipe.to === cardId).map((pipe) => pipe.id)
        );
        state.cards = state.cards.filter((card) => card.id !== cardId);
        state.pipes = state.pipes.filter((pipe) => pipe.from !== cardId && pipe.to !== cardId);
        controlElements.get(cardId)?.remove();
        controlElements.delete(cardId);
        agentRuntime.delete(cardId);
        removedPipeIds.forEach((pipeId) => pipeActiveUntil.delete(pipeId));
        if (selectedCardId === cardId) {
          selectedCardId = null;
        }
        if (selectedPipeId && removedPipeIds.has(selectedPipeId)) {
          selectedPipeId = null;
        }
        if (hoveredCardId === cardId) {
          hoveredCardId = null;
        }
        if (hoveredControlCardId === cardId) {
          hoveredControlCardId = null;
        }
        if (editorCardId === cardId) {
          closeEditor();
        }
        if (chatCardId === cardId) {
          closeChatPanel();
        }
        scheduleSave();
      }

      function deletePipe(pipeId) {
        const sizeBefore = state.pipes.length;
        state.pipes = state.pipes.filter((pipe) => pipe.id !== pipeId);
        if (state.pipes.length === sizeBefore) {
          return;
        }
        pipeActiveUntil.delete(pipeId);
        if (selectedPipeId === pipeId) {
          selectedPipeId = null;
        }
        scheduleSave();
      }

      function clearNoteCard(cardId) {
        const card = getCard(cardId);
        if (!card || card.type !== "note" || !card.content) {
          return;
        }
        card.content = "";
        card.updatedAt = new Date().toISOString();
        scheduleSave();
      }

      function createPipe(fromCardId, fromPortId, toCardId, toPortId) {
        if (fromCardId === toCardId) {
          return;
        }
        const fromCard = getCard(fromCardId);
        const toCard = getCard(toCardId);
        if (!fromCard || !toCard) {
          return;
        }
        const normalizedFromPort = normalizePipeAnchorId(fromPortId, "right");
        const normalizedToPort = normalizePipeAnchorId(toPortId, "left");
        const exists = state.pipes.some(
          (pipe) =>
            pipe.from === fromCardId &&
            pipe.fromPort === normalizedFromPort &&
            pipe.to === toCardId &&
            pipe.toPort === normalizedToPort
        );
        if (exists) {
          return;
        }
        const pipe = {
          id: createId(),
          from: fromCardId,
          fromPort: normalizedFromPort,
          to: toCardId,
          toPort: normalizedToPort,
        };
        state.pipes.push(pipe);
        selectPipe(pipe.id);
        flashPipe(pipe.id);
        scheduleSave();
        propagateAlongNewPipe(pipe);
      }

      function propagateAlongNewPipe(pipe) {
        const target = getCard(pipe.to);
        if (!target) {
          return;
        }
        if (target.type === "agent") {
          requestAgentRun(target.id, { reason: "pipe-connected" });
          return;
        }
        const source = getCard(pipe.from);
        if (!source) {
          return;
        }
        const payload = getCardOutput(source);
        flashPipe(pipe.id);
        propagatePayloadToTarget(source, target, payload, { flowId: createId(), hops: 0, reason: "pipe-connected" });
      }

      function propagateFromCard(sourceCardId, meta) {
        if (meta.hops > MAX_FLOW_HOPS) {
          return;
        }
        const source = getCard(sourceCardId);
        if (!source) {
          return;
        }
        const payload = getCardOutput(source);
        const outgoing = getOutgoingPipes(sourceCardId);
        if (!outgoing.length) {
          return;
        }
        outgoing.forEach((pipe) => {
          const target = getCard(pipe.to);
          if (!target) {
            return;
          }
          // 每次传播都点亮连接线和目标卡片，形成可见的数据流反馈。
          flashPipe(pipe.id);
          propagatePayloadToTarget(source, target, payload, {
            flowId: meta.flowId,
            hops: meta.hops + 1,
            reason: meta.reason,
          });
        });
      }

      function propagatePayloadToTarget(source, target, payload, meta) {
        markCardActive(source.id);
        markCardActive(target.id);

        if (target.type === "agent") {
          // Agent 不是直接写内容，而是重新收集当前全量上游 context 后运行。
          requestAgentRun(target.id, {
            reason: `${meta.reason}:${source.id}`,
          });
          return;
        }

        if (target.type === "note") {
          if (!payload.trim()) {
            return;
          }
          const entry = `[${formatTimestamp(new Date())}] ${source.title}\n${payload}`;
          target.content = target.content ? `${target.content}\n\n${entry}` : entry;
          target.updatedAt = new Date().toISOString();
          scheduleSave();
          return;
        }

        if (target.content === payload) {
          return;
        }
        target.content = payload;
        target.updatedAt = new Date().toISOString();
        scheduleSave();
        if (target.type === "markdown" || target.type === "file") {
          propagateFromCard(target.id, meta);
        }
      }

      function resumeAndRunAgent(cardId, reason) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        if (card.status === "paused") {
          card.status = "idle";
        }
        requestAgentRun(cardId, { reason });
      }

      function pauseAgent(cardId) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        card.status = "paused";
        const runtime = ensureAgentRuntime(cardId);
        runtime.pauseRequested = true;
        pushAgentMessage(cardId, "meta", "已暂停。新的自动触发会被忽略，点击运行可恢复。");
        scheduleSave();
        renderChatPanel();
      }

      function stopAgentRun(cardId, reason) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        const runtime = ensureAgentRuntime(cardId);
        if (runtime.runId) {
          runtime.ignoredRunIds.add(runtime.runId);
        }
        runtime.streamingText = "";
        runtime.runId = null;
        runtime.rerunRequested = false;
        runtime.pauseRequested = false;
        if (card.status !== "paused") {
          card.status = "idle";
        }
        pushAgentMessage(cardId, "meta", reason);
        scheduleSave();
        renderChatPanel();
      }

      async function abortAgentRun(cardId, reason) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        const runtime = ensureAgentRuntime(cardId);
        if (gateway.status === "connected") {
          try {
            await sendGatewayRequest("chat.abort", {
              sessionKey: card.sessionKey,
              runId: runtime.runId || undefined,
            });
          } catch (error) {
            pushAgentMessage(cardId, "meta", `停止请求失败: ${error.message}`);
          }
        }
        stopAgentRun(cardId, reason);
      }

      async function requestAgentRun(cardId, trigger) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        if (card.status === "paused") {
          return;
        }

        const runtime = ensureAgentRuntime(cardId);
        if (runtime.runId) {
          runtime.rerunRequested = true;
          return;
        }

        const upstream = collectUpstreamContext(card.id);
        if (!upstream.text.trim()) {
          pushAgentMessage(card.id, "meta", "没有上游内容，跳过自动运行。");
          renderChatPanel();
          return;
        }

        if (trigger.reason !== "manual-run" && trigger.reason !== "chat-panel" && runtime.lastInputDigest === upstream.digest) {
          return;
        }

        const prompt = buildAgentPrompt(card, upstream);
        runtime.lastInputDigest = upstream.digest;
        pushAgentMessage(card.id, "meta", `自动运行：收集 ${upstream.cards.length} 张上游卡片。`);
        await sendAgentMessage(card.id, prompt, {
          reason: trigger.reason,
          useAsOutputPrompt: true,
        });
      }

      function collectUpstreamContext(cardId) {
        const visited = new Set([cardId]);
        const collected = [];

        function dfs(targetId) {
          const incoming = getIncomingPipes(targetId);
          incoming.forEach((pipe) => {
            const source = getCard(pipe.from);
            if (!source || visited.has(source.id)) {
              return;
            }
            visited.add(source.id);
            dfs(source.id);
            collected.push(source);
          });
        }

        dfs(cardId);

        const blocks = collected.map((card) => {
          const output = getCardOutput(card).trim();
          return `## ${card.title} (${card.type})\n${output || "(empty)"}`;
        });

        return {
          cards: collected,
          text: blocks.join("\n\n"),
          digest: hashString(blocks.join("\n--\n")),
        };
      }

      function buildAgentPrompt(card, upstream) {
        const sections = [
          "你是 Meld 画布中的 agent card。",
          "请基于上游 context 产出一个完整、可直接传递给下游卡片的结果。",
        ];
        if (card.content.trim()) {
          sections.push(`Agent 指令:\n${card.content.trim()}`);
        }
        sections.push(`上游 context:\n${upstream.text}`);
        sections.push("请直接输出结果正文，不要解释你使用了什么协议。");
        return sections.join("\n\n");
      }

      async function sendAgentMessage(cardId, message, options) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        if (gateway.status !== "connected") {
          card.status = "error";
          pushAgentMessage(cardId, "meta", "Gateway 未连接，无法运行。");
          renderChatPanel();
          scheduleSave();
          return;
        }

        const runtime = ensureAgentRuntime(cardId);
        runtime.pauseRequested = false;
        runtime.streamingText = "";
        card.status = "running";
        markCardActive(cardId);
        renderChatPanel();
        scheduleSave();

        try {
          const requestId = createId();
          const response = await sendGatewayRequest("chat.send", {
            sessionKey: card.sessionKey,
            message,
            deliver: false,
            idempotencyKey: createId(),
          }, requestId);

          runtime.runId = response?.runId || requestId;
          runtime.pendingReason = options.reason || "";
          markCardActive(cardId);
        } catch (error) {
          runtime.runId = null;
          runtime.streamingText = "";
          card.status = "error";
          pushAgentMessage(cardId, "meta", `发送失败: ${error.message}`);
          renderChatPanel();
          scheduleSave();
        }
      }

      function ensureAgentRuntime(cardId) {
        if (!agentRuntime.has(cardId)) {
          agentRuntime.set(cardId, {
            runId: null,
            streamingText: "",
            lastInputDigest: "",
            rerunRequested: false,
            pauseRequested: false,
            pendingReason: "",
            ignoredRunIds: new Set(),
          });
        }
        return agentRuntime.get(cardId);
      }

      function pushAgentMessage(cardId, role, text) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent" || !text) {
          return;
        }
        if (!Array.isArray(card.messages)) {
          card.messages = [];
        }
        card.messages.push({
          id: createId(),
          role,
          text,
          createdAt: new Date().toISOString(),
        });
        card.messages = card.messages.slice(-60);
        scheduleSave();
      }

      async function connectGateway() {
        const url = gatewayUrlInput.value.trim();
        const token = gatewayTokenInput.value.trim();
        saveGatewaySettings();

        if (!url || !token) {
          gateway.status = "error";
          gateway.detail = "需要同时提供 URL 和 Token";
          updateGatewayUI();
          return;
        }

        disconnectGateway();
        gateway.status = "connecting";
        gateway.detail = "WebSocket 已创建，等待 connect.challenge";
        updateGatewayUI();

        try {
          const socket = new WebSocket(url);
          gateway.socket = socket;

          socket.addEventListener("open", () => {
            gateway.status = "connecting";
            gateway.detail = "连接已打开，等待 gateway challenge";
            updateGatewayUI();
          });

          socket.addEventListener("message", async (event) => {
            let message = null;
            try {
              message = JSON.parse(event.data);
            } catch (error) {
              console.warn("Invalid gateway message:", event.data);
              return;
            }

            if (isConnectChallenge(message)) {
              try {
                // 按已验证协议收到 challenge 后再发送 connect 请求。
                await sendGatewayRequest("connect", {
                  minProtocol: 3,
                  maxProtocol: 3,
                  auth: { token },
                  client: {
                    id: "openclaw-control-ui",
                    version: "0.1.0",
                    platform: "web",
                    mode: "webchat",
                  },
                  role: "operator",
                  scopes: ["operator.admin", "operator.read", "operator.write"],
                  caps: ["tool-events"],
                  userAgent: navigator.userAgent,
                });
                gateway.status = "connected";
                gateway.detail = "握手完成，可发送 chat.send";
                updateGatewayUI();
              } catch (error) {
                gateway.status = "error";
                gateway.detail = `握手失败: ${error.message}`;
                updateGatewayUI();
              }
              return;
            }

            handleGatewayMessage(message);
          });

          socket.addEventListener("close", () => {
            rejectAllGatewayPending("WebSocket 已关闭");
            if (gateway.status !== "error") {
              gateway.status = "disconnected";
              gateway.detail = "连接已断开";
            }
            gateway.socket = null;
            updateGatewayUI();
          });

          socket.addEventListener("error", () => {
            gateway.status = "error";
            gateway.detail = "WebSocket 出现错误";
            updateGatewayUI();
          });
        } catch (error) {
          gateway.status = "error";
          gateway.detail = error.message;
          updateGatewayUI();
        }
      }

      function disconnectGateway() {
        rejectAllGatewayPending("连接已断开");
        if (gateway.socket) {
          gateway.socket.close();
        }
        gateway.socket = null;
        gateway.status = "disconnected";
        gateway.detail = "未连接";
        updateGatewayUI();
      }

      function isConnectChallenge(message) {
        return message && message.event === "connect.challenge";
      }

      function handleGatewayMessage(message) {
        if (message.type === "res" && message.id && gateway.pending.has(message.id)) {
          const pending = gateway.pending.get(message.id);
          gateway.pending.delete(message.id);
          window.clearTimeout(pending.timeoutId);
          if (message.ok) {
            pending.resolve(message.payload || {});
          } else {
            pending.reject(new Error(message.error?.message || "Gateway request failed"));
          }
          return;
        }

        if (message.type === "event" && message.event === "chat") {
          handleChatEvent(message.payload || {});
        }
      }

      function sendGatewayRequest(method, params, forcedId) {
        if (!gateway.socket || gateway.socket.readyState !== WebSocket.OPEN) {
          return Promise.reject(new Error("Gateway socket 未连接"));
        }
        const id = forcedId || createId();
        const payload = {
          type: "req",
          id,
          method,
          params,
        };

        return new Promise((resolve, reject) => {
          const timeoutId = window.setTimeout(() => {
            gateway.pending.delete(id);
            reject(new Error(`${method} 超时`));
          }, 20000);

          gateway.pending.set(id, { resolve, reject, timeoutId });
          gateway.socket.send(JSON.stringify(payload));
        });
      }

      function rejectAllGatewayPending(reason) {
        gateway.pending.forEach((pending, id) => {
          window.clearTimeout(pending.timeoutId);
          pending.reject(new Error(reason));
          gateway.pending.delete(id);
        });
      }

      function handleChatEvent(payload) {
        const text = extractTextFromPayload(payload.message);
        const sessionKey = normalizeSessionKey(payload.sessionKey || "");
        const runId = payload.runId || "";
        const card = state.cards.find((item) => item.type === "agent" && normalizeSessionKey(item.sessionKey) === sessionKey);
        if (!card) {
          return;
        }

        const runtime = ensureAgentRuntime(card.id);
        if (runId && runtime.runId && runId !== runtime.runId) {
          return;
        }
        if (runId && runtime.ignoredRunIds.has(runId)) {
          return;
        }

        markCardActive(card.id);

        if (payload.state === "delta") {
          // delta 期间只更新流式草稿，不立刻传播到下游。
          runtime.runId = runId || runtime.runId;
          runtime.streamingText = mergeDeltaText(runtime.streamingText, text);
          renderChatPanel();
          return;
        }

        if (payload.state === "final") {
          runtime.runId = runId || runtime.runId;
          const finalText = mergeFinalText(runtime.streamingText, text);
          runtime.streamingText = "";
          finalizeAgentRun(card.id, finalText, runId);
        }
      }

      function finalizeAgentRun(cardId, output, runId) {
        const card = getCard(cardId);
        if (!card || card.type !== "agent") {
          return;
        }
        const runtime = ensureAgentRuntime(cardId);
        if (runId && runtime.ignoredRunIds.has(runId)) {
          runtime.ignoredRunIds.delete(runId);
          runtime.runId = null;
          runtime.streamingText = "";
          card.status = card.status === "paused" ? "paused" : "idle";
          renderChatPanel();
          return;
        }

        card.output = output || "";
        card.updatedAt = new Date().toISOString();
        if (output) {
          pushAgentMessage(card.id, "assistant", output);
        }
        markCardActive(card.id);

        const shouldPause = runtime.pauseRequested || card.status === "paused";
        runtime.pauseRequested = false;
        runtime.runId = null;
        card.status = shouldPause ? "paused" : "idle";
        scheduleSave();
        renderChatPanel();

        if (!shouldPause && output.trim()) {
          propagateFromCard(card.id, { reason: "agent-final", hops: 0, flowId: createId() });
        }

        if (!shouldPause && runtime.rerunRequested) {
          runtime.rerunRequested = false;
          requestAgentRun(card.id, { reason: "rerun" });
        }
      }

      function updateGatewayUI() {
        updateStatusDot(settingsStatusDot, gateway.status);
        updateStatusDot(settingsPanelStatusDot, gateway.status);
        settingsPanelStatusText.textContent = GATEWAY_STATUS_LABELS[gateway.status] || gateway.status;
        gatewayDetail.textContent = gateway.detail;
        updateHUD();
        renderChatPanel();
      }

      function updateStatusDot(node, status) {
        node.className = `status-dot status-${status}`;
      }

      function frame(now) {
        const dt = Math.min(64, now - lastFrameTime);
        lastFrameTime = now;
        render(now, dt);
        requestAnimationFrame(frame);
      }

      function render(now, dt) {
        ctx.clearRect(0, 0, viewport.width, viewport.height);
        drawGrid();
        drawPipes(now);
        drawCards(now, dt);
        drawPendingConnection();
        syncControlLayer();
        syncPipeDeleteButton();
        updateHUD();
      }

      function drawGrid() {
        const step = GRID_SIZE * state.camera.zoom;
        if (step < 10) {
          return;
        }
        const offsetX = ((-state.camera.x * state.camera.zoom) % step + step) % step;
        const offsetY = ((-state.camera.y * state.camera.zoom) % step + step) % step;

        ctx.fillStyle = "#2a2a2a";
        for (let x = offsetX; x < viewport.width; x += step) {
          for (let y = offsetY; y < viewport.height; y += step) {
            ctx.beginPath();
            ctx.arc(x, y, 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function drawPipes(now) {
        state.pipes.forEach((pipe) => {
          const curve = getPipeCurve(pipe.from, pipe.fromPort, pipe.to, pipe.toPort);
          if (!curve) {
            return;
          }
          const active = isPipeActive(pipe, now);
          const pulse = active ? 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(now / 180)) : 0;
          const selected = selectedPipeId === pipe.id;
          const strokeStyle = selected
            ? "rgba(255, 255, 255, 0.96)"
            : active
              ? `rgba(245, 158, 11, ${0.45 + pulse * 0.4})`
              : "rgba(255, 255, 255, 0.18)";
          const lineWidth = (selected ? 5.5 : active ? 5 + pulse * 2 : 3.5) * state.camera.zoom;

          ctx.save();
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          if (selected) {
            ctx.beginPath();
            ctx.moveTo(curve.p0.x, curve.p0.y);
            ctx.bezierCurveTo(curve.p1.x, curve.p1.y, curve.p2.x, curve.p2.y, curve.p3.x, curve.p3.y);
            ctx.strokeStyle = "rgba(239, 68, 68, 0.42)";
            ctx.lineWidth = lineWidth + 5 * state.camera.zoom;
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.moveTo(curve.p0.x, curve.p0.y);
          ctx.bezierCurveTo(curve.p1.x, curve.p1.y, curve.p2.x, curve.p2.y, curve.p3.x, curve.p3.y);
          ctx.strokeStyle = strokeStyle;
          ctx.lineWidth = lineWidth;
          ctx.stroke();
          ctx.restore();

          drawFlowIndicator(curve, active ? pulse : 0);
          drawPipeArrow(curve, strokeStyle);
        });
      }

      function drawFlowIndicator(curve, pulse) {
        const t = 0.5 + 0.2 * Math.sin(performance.now() / 260);
        const point = cubicBezierPoint(
          curve.p0,
          curve.p1,
          curve.p2,
          curve.p3,
          t
        );

        ctx.beginPath();
        ctx.arc(point.x, point.y, (3 + pulse * 1.5) * state.camera.zoom, 0, Math.PI * 2);
        ctx.fillStyle = pulse ? `rgba(251, 191, 36, ${0.4 + pulse * 0.5})` : "rgba(255, 255, 255, 0.18)";
        ctx.fill();
      }

      function drawPipeArrow(curve, color) {
        const tangent = cubicBezierTangent(curve.p0, curve.p1, curve.p2, curve.p3, 0.995);
        const tangentLength = Math.hypot(tangent.x, tangent.y);
        if (!tangentLength) {
          return;
        }
        const ux = tangent.x / tangentLength;
        const uy = tangent.y / tangentLength;
        const arrowLength = 8 * state.camera.zoom;
        const halfWidth = arrowLength * 0.55;
        const tipOffset = 2.5 * state.camera.zoom;
        const tip = {
          x: curve.p3.x - ux * tipOffset,
          y: curve.p3.y - uy * tipOffset,
        };
        const base = {
          x: tip.x - ux * arrowLength,
          y: tip.y - uy * arrowLength,
        };
        const px = -uy;
        const py = ux;

        ctx.beginPath();
        ctx.moveTo(tip.x, tip.y);
        ctx.lineTo(base.x + px * halfWidth, base.y + py * halfWidth);
        ctx.lineTo(base.x - px * halfWidth, base.y - py * halfWidth);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      function drawCards(now, dt) {
        state.cards.forEach((card) => {
          const rect = getCardScreenRect(card);
          if (!rectVisible(rect)) {
            return;
          }

          const activePulse = card.status === "running" || now < card.activeUntil
            ? 0.45 + 0.55 * (0.5 + 0.5 * Math.sin(now / 190))
            : 0;
          const zoom = state.camera.zoom;

          ctx.save();
          ctx.beginPath();
          roundRectPath(ctx, rect.x, rect.y, rect.w, rect.h, 8 * zoom);
          ctx.fillStyle = "#ffffff";
          ctx.shadowColor = activePulse ? `rgba(245, 158, 11, ${0.18 + activePulse * 0.2})` : "rgba(0, 0, 0, 0.22)";
          ctx.shadowBlur = (activePulse ? 24 : 18) * zoom;
          ctx.shadowOffsetY = 10 * zoom;
          ctx.fill();
          ctx.restore();

          ctx.beginPath();
          roundRectPath(ctx, rect.x, rect.y, rect.w, rect.h, 8 * zoom);
          ctx.lineWidth = (selectedCardId === card.id ? 2 : 1.5) * zoom;
          ctx.strokeStyle = selectedCardId === card.id
            ? "rgba(59, 130, 246, 0.96)"
            : activePulse
              ? `rgba(245, 158, 11, ${0.3 + activePulse * 0.45})`
              : "rgba(15, 23, 42, 0.18)";
          ctx.stroke();

          const bandHeight = getCardHeaderHeight(rect);
          ctx.fillStyle = CARD_COLORS[card.type];
          ctx.fillRect(rect.x, rect.y, rect.w, bandHeight);

          drawCardBody(card, rect, bandHeight);
        });
      }

      function drawPendingConnection() {
        if ((interaction.mode !== "connect" && interaction.mode !== "edge-connect") || !interaction.connectFromCardId || !interaction.connectFromPortId) {
          return;
        }
        const startCard = getCard(interaction.connectFromCardId);
        if (!startCard) {
          return;
        }
        const snappedTarget = interaction.connectTargetCardId && interaction.connectTargetPortId
          ? {
              card: getCard(interaction.connectTargetCardId),
              side: interaction.connectTargetPortId,
            }
          : null;
        const targetPoint = snappedTarget?.card
          ? getRectCenter(getCardScreenRect(snappedTarget.card))
          : { x: interaction.connectPointerX, y: interaction.connectPointerY };
        const startAnchor = getCardEdgeAnchor(startCard, targetPoint.x, targetPoint.y, interaction.connectFromPortId);
        const endAnchor = snappedTarget?.card
