<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meld MVP Canvas</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #0f0f0f;
      --panel: rgba(22, 22, 24, 0.96);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text-primary: rgba(255, 255, 255, 0.96);
      --text-secondary: rgba(255, 255, 255, 0.64);
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    body {
      position: relative;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      touch-action: none;
    }

    .floating-panel {
      position: fixed;
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .hidden {
      display: none;
    }

    #context-menu {
      min-width: 196px;
      padding: 8px;
    }

    #context-menu .menu-title {
      padding: 8px 10px 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    #context-menu .menu-divider {
      height: 1px;
      margin: 8px 4px;
      background: rgba(255, 255, 255, 0.08);
    }

    #context-menu button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      font-size: 14px;
    }

    #context-menu button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #delete-card-button {
      color: #fca5a5;
    }

    #editor-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.24);
    }

    #editor-panel {
      position: absolute;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 360px;
      min-height: 260px;
      padding: 14px;
    }

    #editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
    }

    #editor-header span:last-child {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    #editor-text {
      flex: 1;
      width: 100%;
      min-height: 180px;
      resize: none;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: #101012;
      color: var(--text-primary);
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    #editor-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    #editor-actions button {
      padding: 8px 12px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    #cancel-editor {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    #save-editor {
      background: #ffffff;
      color: #111111;
      font-weight: 600;
    }

    #hud {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(16, 16, 18, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
      line-height: 1;
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    #topbar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 24;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(22, 22, 24, 0.82);
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }

    .icon-button:hover {
      background: rgba(34, 34, 38, 0.92);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .status-dot.disconnected {
      background: #ef4444;
    }

    .status-dot.connecting {
      background: #f59e0b;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.error {
      background: #ef4444;
    }

    #settings-toggle {
      gap: 8px;
      padding: 0 12px;
      width: auto;
      min-width: 40px;
    }

    #settings-toggle .gear {
      font-size: 16px;
      line-height: 1;
    }

    #settings-panel {
      top: 64px;
      right: 16px;
      z-index: 24;
      width: 320px;
      padding: 14px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
    }

    .panel-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .panel-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .panel-field input,
    .panel-field textarea,
    #agent-chat-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(10, 10, 12, 0.8);
      color: var(--text-primary);
      outline: none;
      font: 13px/1.5 Inter, system-ui, sans-serif;
      user-select: text;
      -webkit-user-select: text;
    }

    .panel-field input:focus,
    .panel-field textarea:focus,
    #agent-chat-input:focus {
      border-color: rgba(96, 165, 250, 0.75);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
    }

    .panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .panel-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .panel-actions button,
    .chat-action-button {
      padding: 9px 12px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .panel-actions button.secondary,
    .chat-action-button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .panel-actions button.primary,
    .chat-action-button.primary {
      background: #ffffff;
      color: #111111;
      font-weight: 600;
    }

    .chat-action-button.warn {
      background: rgba(245, 158, 11, 0.14);
      color: #fbbf24;
    }

    #agent-chat-panel {
      z-index: 26;
      width: 400px;
      height: 500px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #agent-chat-panel.hidden {
      display: none;
    }

    #agent-chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #agent-chat-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    #agent-chat-title strong {
      color: var(--text-primary);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #agent-chat-title span {
      color: var(--text-secondary);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #agent-chat-close {
      width: 30px;
      height: 30px;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 15px;
    }

    #agent-chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-empty {
      margin: auto 0;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .chat-message {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-message.assistant {
      align-self: flex-start;
      background: rgba(30, 41, 59, 0.92);
      color: rgba(255, 255, 255, 0.96);
    }

    .chat-message.user {
      align-self: flex-end;
      background: rgba(96, 165, 250, 0.2);
      color: rgba(219, 234, 254, 0.98);
      border: 1px solid rgba(96, 165, 250, 0.22);
    }

    .chat-message.meta {
      align-self: center;
      max-width: 100%;
      padding: 0;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
    }

    #agent-chat-composer {
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #agent-chat-input {
      min-height: 92px;
      max-height: 140px;
      resize: vertical;
      font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    #agent-chat-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #agent-chat-hint {
      color: var(--text-secondary);
      font-size: 12px;
      min-width: 0;
    }

    #agent-chat-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="topbar">
    <button id="settings-toggle" class="icon-button" type="button" aria-label="Open gateway settings">
      <span id="settings-status-dot" class="status-dot disconnected"></span>
      <span class="gear">&#9881;</span>
    </button>
  </div>

  <div id="context-menu" class="floating-panel hidden">
    <div id="context-menu-title" class="menu-title">创建卡片</div>
    <button type="button" data-action="create" data-card-type="markdown">新建 Markdown</button>
    <button type="button" data-action="create" data-card-type="file">新建 File</button>
    <button type="button" data-action="create" data-card-type="agent">新建 Agent</button>
    <button type="button" data-action="create" data-card-type="note">新建 Note</button>
    <div id="delete-divider" class="menu-divider hidden"></div>
    <button id="delete-card-button" class="hidden" type="button" data-action="delete-card">删除卡片</button>
  </div>

  <div id="editor-overlay" class="hidden">
    <div id="editor-panel" class="floating-panel">
      <div id="editor-header">
        <span id="editor-title">编辑 Markdown</span>
        <span>Ctrl/Cmd + S 保存</span>
      </div>
      <textarea id="editor-text" spellcheck="false"></textarea>
      <div id="editor-actions">
        <button id="cancel-editor" type="button">取消</button>
        <button id="save-editor" type="button">保存</button>
      </div>
    </div>
  </div>

  <div id="settings-panel" class="floating-panel hidden">
    <div class="panel-header">
      <div>
        <div class="panel-title">OpenClaw Gateway</div>
        <div class="panel-subtitle">连接全局 Agent Runtime</div>
      </div>
      <div class="panel-status">
        <span id="settings-panel-status-dot" class="status-dot disconnected"></span>
        <span id="settings-panel-status-text">未连接</span>
      </div>
    </div>
    <label class="panel-field">
      <span>Gateway URL</span>
      <input id="gateway-url-input" type="text" value="ws://127.0.0.1:18789" spellcheck="false" />
    </label>
    <label class="panel-field">
      <span>Gateway Token</span>
      <input id="gateway-token-input" type="password" placeholder="请输入 token" spellcheck="false" />
    </label>
    <div class="panel-row">
      <div class="panel-subtitle" id="settings-panel-detail">握手完成后即可发送 chat 请求</div>
      <div class="panel-actions">
        <button id="gateway-disconnect-button" class="secondary" type="button">断开</button>
        <button id="gateway-connect-button" class="primary" type="button">连接</button>
      </div>
    </div>
  </div>

  <div id="agent-chat-panel" class="floating-panel hidden">
    <div id="agent-chat-header">
      <div id="agent-chat-title">
        <strong id="agent-chat-title-text">Agent Chat</strong>
        <span id="agent-chat-subtitle">sessionKey</span>
      </div>
      <button id="agent-chat-close" type="button" aria-label="Close chat">×</button>
    </div>
    <div id="agent-chat-history"></div>
    <div id="agent-chat-composer">
      <textarea id="agent-chat-input" spellcheck="false" placeholder="输入消息，Ctrl/Cmd + Enter 发送"></textarea>
      <div id="agent-chat-footer">
        <div id="agent-chat-hint">未连接到 Gateway</div>
        <div id="agent-chat-actions">
          <button id="agent-chat-stop" class="chat-action-button warn" type="button">停止</button>
          <button id="agent-chat-send" class="chat-action-button primary" type="button">发送</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hud">缩放 100% · 0 张卡片</div>

  <script>
    const STORAGE_KEY = "meld-mvp-canvas-v1";
    const STORAGE_FALLBACK_KEYS = ["meld-mvp-canvas-v2"];
    const GATEWAY_SETTINGS_KEY = "meld-openclaw-gateway-v1";
    const GRID_SIZE = 40;
    const DEFAULT_CARD_SIZE = { w: 2, h: 3 };
    const CARD_TYPES = ["markdown", "file", "agent", "note"];
    const AGENT_STATUSES = ["idle", "running", "paused"];
    const GATEWAY_STATUSES = ["disconnected", "connecting", "connected", "error"];
    const MIN_ZOOM = 0.25;
    const MAX_ZOOM = 3;
    const LONG_PRESS_MS = 460;
    const DOUBLE_TAP_MS = 320;
    const TAP_MOVE_THRESHOLD = 10;
    const PIPE_HIT_THRESHOLD = 10;
    const CARD_COLORS = {
      markdown: "#3b82f6",
      file: "#10b981",
      agent: "#f59e0b",
      note: "#8b5cf6",
    };
    const AGENT_STATUS_COLORS = {
      idle: "#94a3b8",
      running: "#f59e0b",
      paused: "#60a5fa",
    };
    const GATEWAY_STATUS_COLORS = {
      disconnected: "#ef4444",
      connecting: "#f59e0b",
      connected: "#22c55e",
      error: "#ef4444",
    };
    const TYPE_LABELS = {
      markdown: "Markdown",
      file: "File",
      agent: "Agent",
      note: "Note",
    };
    const TYPE_DEFAULT_CONTENT = {
      markdown: "# New markdown card",
      file: "File card",
      agent: "Agent card",
      note: "- Note item",
    };

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const contextMenu = document.getElementById("context-menu");
    const contextMenuTitle = document.getElementById("context-menu-title");
    const deleteDivider = document.getElementById("delete-divider");
    const deleteCardButton = document.getElementById("delete-card-button");
    const editorOverlay = document.getElementById("editor-overlay");
    const editorPanel = document.getElementById("editor-panel");
    const editorTitle = document.getElementById("editor-title");
    const editorText = document.getElementById("editor-text");
    const saveEditorButton = document.getElementById("save-editor");
    const cancelEditorButton = document.getElementById("cancel-editor");
    const hud = document.getElementById("hud");
    const settingsToggle = document.getElementById("settings-toggle");
    const settingsStatusDot = document.getElementById("settings-status-dot");
    const settingsPanel = document.getElementById("settings-panel");
    const settingsPanelStatusDot = document.getElementById("settings-panel-status-dot");
    const settingsPanelStatusText = document.getElementById("settings-panel-status-text");
    const settingsPanelDetail = document.getElementById("settings-panel-detail");
    const gatewayUrlInput = document.getElementById("gateway-url-input");
    const gatewayTokenInput = document.getElementById("gateway-token-input");
    const gatewayConnectButton = document.getElementById("gateway-connect-button");
    const gatewayDisconnectButton = document.getElementById("gateway-disconnect-button");
    const agentChatPanel = document.getElementById("agent-chat-panel");
    const agentChatTitleText = document.getElementById("agent-chat-title-text");
    const agentChatSubtitle = document.getElementById("agent-chat-subtitle");
    const agentChatHistory = document.getElementById("agent-chat-history");
    const agentChatInput = document.getElementById("agent-chat-input");
    const agentChatHint = document.getElementById("agent-chat-hint");
    const agentChatSendButton = document.getElementById("agent-chat-send");
    const agentChatStopButton = document.getElementById("agent-chat-stop");
    const agentChatCloseButton = document.getElementById("agent-chat-close");

    const viewport = {
      width: window.innerWidth,
      height: window.innerHeight,
      dpr: window.devicePixelRatio || 1,
    };

    let state = loadState();
    let saveTimer = null;
    let editorCardId = null;
    let chatCardId = null;
    let contextMenuState = null;
    let hudText = "";
    let lastTap = {
      time: 0,
      cardId: null,
      x: 0,
      y: 0,
    };

    const selection = {
      type: null,
      id: null,
    };

    const hover = {
      cardId: null,
      kind: null,
    };

    const effects = {
      cardEntrances: new Map(),
      pipeFlashes: new Map(),
    };

    const agentSessions = new Map();
    const gateway = {
      status: "disconnected",
      socket: null,
      pending: new Map(),
      detail: "",
      connectTimeoutId: null,
      settings: loadGatewaySettings(),
    };

    const interaction = {
      mode: "idle",
      pointerX: 0,
      pointerY: 0,
      cardId: null,
      fromCardId: null,
      dragOffsetWorldX: 0,
      dragOffsetWorldY: 0,
      startScreenX: 0,
      startScreenY: 0,
      startCameraX: 0,
      startCameraY: 0,
      startZoom: 1,
      pinchWorldX: 0,
      pinchWorldY: 0,
      pinchStartDistance: 0,
      touchId: null,
      touchIntent: null,
      moved: false,
      longPressTimer: null,
    };

    function createDefaultState() {
      return {
        version: 3,
        camera: {
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          zoom: 1,
        },
        cards: [],
        pipes: [],
      };
    }

    function normalizeState(raw) {
      const fallback = createDefaultState();
      if (!raw || typeof raw !== "object") {
        return fallback;
      }

      const normalizedCards = Array.isArray(raw.cards)
        ? raw.cards
            .filter((card) => card && typeof card === "object")
            .map((card) => {
              const type = CARD_TYPES.includes(card.type) ? card.type : "markdown";
              const normalizedId = typeof card.id === "string" ? card.id : createId();
              const status = type === "agent" && card.meta?.status === "paused" ? "paused" : "idle";
              const sessionKey =
                type === "agent"
                  ? typeof card.meta?.sessionKey === "string" && card.meta.sessionKey.trim()
                    ? card.meta.sessionKey
                    : buildAgentSessionKey(normalizedId)
                  : null;
              const bufferedInputs =
                type === "agent" && Array.isArray(card.meta?.bufferedInputs)
                  ? card.meta.bufferedInputs
                      .filter((item) => item && typeof item === "object")
                      .map((item) => ({
                        id: typeof item.id === "string" ? item.id : createId(),
                        message: typeof item.message === "string" ? item.message : "",
                        sourceCardId: typeof item.sourceCardId === "string" ? item.sourceCardId : null,
                        created: typeof item.created === "string" ? item.created : new Date().toISOString(),
                      }))
                      .filter((item) => item.message)
                  : [];
              return {
                id: normalizedId,
                type,
                position: {
                  x: Number.isFinite(card.position?.x) ? card.position.x : 0,
                  y: Number.isFinite(card.position?.y) ? card.position.y : 0,
                },
                size: {
                  w: Number.isFinite(card.size?.w) ? card.size.w : DEFAULT_CARD_SIZE.w,
                  h: Number.isFinite(card.size?.h) ? card.size.h : DEFAULT_CARD_SIZE.h,
                },
                content: typeof card.content === "string" ? card.content : TYPE_DEFAULT_CONTENT[type],
                meta: {
                  title:
                    typeof card.meta?.title === "string" && card.meta.title.trim()
                      ? card.meta.title
                      : TYPE_LABELS[type],
                  created:
                    typeof card.meta?.created === "string"
                      ? card.meta.created
                      : new Date().toISOString(),
                  status,
                  sessionKey,
                  bufferedInputs,
                },
              };
            })
        : [];

      const cardIds = new Set(normalizedCards.map((card) => card.id));
      const normalizedPipes = Array.isArray(raw.pipes)
        ? raw.pipes
            .filter((pipe) => pipe && typeof pipe === "object")
            .filter((pipe) => cardIds.has(pipe.from) && cardIds.has(pipe.to))
            .map((pipe) => ({
              id: typeof pipe.id === "string" ? pipe.id : createId(),
              from: pipe.from,
              to: pipe.to,
              active: pipe.active !== false,
            }))
        : [];

      return {
        version: 3,
        camera: {
          x: Number.isFinite(raw.camera?.x) ? raw.camera.x : fallback.camera.x,
          y: Number.isFinite(raw.camera?.y) ? raw.camera.y : fallback.camera.y,
          zoom: Number.isFinite(raw.camera?.zoom) ? clamp(raw.camera.zoom, MIN_ZOOM, MAX_ZOOM) : 1,
        },
        cards: normalizedCards,
        pipes: normalizedPipes,
      };
    }

    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          return normalizeState(JSON.parse(stored));
        }
        for (const key of STORAGE_FALLBACK_KEYS) {
          const fallbackStored = localStorage.getItem(key);
          if (fallbackStored) {
            return normalizeState(JSON.parse(fallbackStored));
          }
        }
        return createDefaultState();
      } catch (error) {
        console.warn("Failed to load saved canvas state.", error);
        return createDefaultState();
      }
    }

    function saveState() {
      clearTimeout(saveTimer);
      saveTimer = null;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = window.setTimeout(saveState, 100);
    }

    function createId() {
      if (window.crypto?.randomUUID) {
        return window.crypto.randomUUID();
      }
      return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function loadGatewaySettings() {
      try {
        const raw = JSON.parse(localStorage.getItem(GATEWAY_SETTINGS_KEY) || "{}");
        return {
          url: typeof raw.url === "string" && raw.url.trim() ? raw.url : "ws://127.0.0.1:18789",
          token: typeof raw.token === "string" ? raw.token : "",
        };
      } catch (error) {
        return {
          url: "ws://127.0.0.1:18789",
          token: "",
        };
      }
    }

    // Auto-configure from meld-config.json (server-side generated, contains gateway URL + token)
    async function autoConfigureGateway() {
      // Skip if user already has settings saved
      if (gateway.settings.token) return;
      try {
        const resp = await fetch("meld-config.json", { cache: "no-store" });
        if (!resp.ok) return;
        const config = await resp.json();
        if (config.gatewayUrl) gateway.settings.url = config.gatewayUrl;
        if (config.gatewayToken) gateway.settings.token = config.gatewayToken;
        localStorage.setItem(GATEWAY_SETTINGS_KEY, JSON.stringify(gateway.settings));
        syncGatewaySettingsInputs();
        // Auto-connect after loading config
        connectGateway();
      } catch (e) { /* no config file, user configures manually */ }
    }

    function saveGatewaySettings() {
      gateway.settings.url = gatewayUrlInput.value.trim() || "ws://127.0.0.1:18789";
      gateway.settings.token = gatewayTokenInput.value;
      localStorage.setItem(GATEWAY_SETTINGS_KEY, JSON.stringify(gateway.settings));
      gatewayUrlInput.value = gateway.settings.url;
    }

    function syncGatewaySettingsInputs() {
      gatewayUrlInput.value = gateway.settings.url;
      gatewayTokenInput.value = gateway.settings.token;
    }

    function buildAgentSessionKey(cardId) {
      return `meld-agent-${String(cardId || "").slice(0, 8) || "session"}`;
    }

    function getGatewayStatusLabel(status) {
      switch (status) {
        case "connected":
          return "已连接";
        case "connecting":
          return "连接中";
        case "error":
          return "连接异常";
        default:
          return "未连接";
      }
    }

    function updateStatusDot(element, status) {
      for (const name of GATEWAY_STATUSES) {
        element.classList.remove(name);
      }
      element.classList.add(status);
    }

    function getAgentSessionState(cardId) {
      if (!agentSessions.has(cardId)) {
        agentSessions.set(cardId, {
          messages: [],
          historyLoaded: false,
          historyLoading: false,
          currentRequestToken: null,
          currentAssistantMessageId: null,
          currentAssistantText: "",
          responseReceived: false,
          streamFinalizeTimer: null,
          abortRequested: false,
        });
      }
      return agentSessions.get(cardId);
    }

    function getAgentUpstreamCards(cardId) {
      return state.pipes
        .filter((pipe) => pipe.active !== false && pipe.to === cardId)
        .map((pipe) => getCardById(pipe.from))
        .filter(Boolean);
    }

    function getAgentDownstreamPipes(cardId) {
      return state.pipes.filter((pipe) => pipe.active !== false && pipe.from === cardId);
    }

    function findAgentCardBySessionKey(sessionKey) {
      return state.cards.find((card) => card.type === "agent" && card.meta?.sessionKey === sessionKey) || null;
    }

    function sanitizeUserMessageForDisplay(content) {
      if (typeof content !== "string") {
        return "";
      }
      const marker = "[User message]";
      const index = content.lastIndexOf(marker);
      if (index >= 0) {
        return content.slice(index + marker.length).trim();
      }
      return content.trim();
    }

    function normalizeHistoryMessages(result) {
      const list = Array.isArray(result)
        ? result
        : Array.isArray(result?.messages)
          ? result.messages
          : Array.isArray(result?.items)
            ? result.items
            : Array.isArray(result?.history)
              ? result.history
              : [];
      return list
        .filter((item) => item && typeof item === "object")
        .map((item) => ({
          id: typeof item.id === "string" ? item.id : createId(),
          role: item.role === "assistant" ? "assistant" : item.role === "user" ? "user" : "meta",
          content:
            item.role === "user"
              ? sanitizeUserMessageForDisplay(typeof item.content === "string" ? item.content : "")
              : typeof item.content === "string"
                ? item.content
                : JSON.stringify(item.content ?? "", null, 2),
        }));
    }

    function mergeStreamContent(existing, incoming) {
      if (!incoming) {
        return existing;
      }
      if (!existing) {
        return incoming;
      }
      if (incoming.startsWith(existing)) {
        return incoming;
      }
      const overlap = Math.min(existing.length, incoming.length);
      for (let index = overlap; index > 0; index -= 1) {
        if (existing.endsWith(incoming.slice(0, index))) {
          return existing + incoming.slice(index);
        }
      }
      return existing + incoming;
    }

    function setGatewayStatus(status, detail = "") {
      gateway.status = status;
      gateway.detail = detail;
      updateGatewayUi();
      if (chatCardId) {
        renderAgentChat();
      }
    }

    function updateGatewayUi() {
      const label = getGatewayStatusLabel(gateway.status);
      updateStatusDot(settingsStatusDot, gateway.status);
      updateStatusDot(settingsPanelStatusDot, gateway.status);
      settingsPanelStatusText.textContent = label;
      settingsPanelDetail.textContent =
        gateway.detail ||
        (gateway.status === "connected"
          ? "connect 握手完成，可以发送 chat.send / chat.history"
          : gateway.status === "connecting"
            ? "正在建立 WebSocket 并等待 connect 响应"
            : "设置会保存在本地，适合手机和桌面复用");
      gatewayConnectButton.disabled = gateway.status === "connecting" || gateway.status === "connected";
      gatewayDisconnectButton.disabled = gateway.status === "disconnected";
      if (chatCardId) {
        const chatCard = getCardById(chatCardId);
        const paused = chatCard?.meta?.status === "paused";
        const running = chatCard?.meta?.status === "running";
        agentChatHint.textContent = paused
          ? "当前 Agent 已暂停，恢复后再发送"
          : running
            ? "Agent 正在回复中"
            : label === "已连接"
              ? "Ctrl/Cmd + Enter 发送"
              : "请先连接到 Gateway";
        agentChatSendButton.disabled = paused || gateway.status !== "connected" || !chatCard;
        agentChatStopButton.disabled = !running || gateway.status !== "connected";
      }
    }

    function positionAgentChatPanel(card) {
      if (!card) {
        return;
      }
      const rect = getCardScreenRect(card);
      const panelWidth = 400;
      const panelHeight = 500;
      const preferredRight = rect.x + rect.width + 16;
      const preferredLeft = rect.x - panelWidth - 16;
      const left = preferredRight + panelWidth <= viewport.width - 16 ? preferredRight : preferredLeft >= 16 ? preferredLeft : clamp(rect.x, 16, viewport.width - panelWidth - 16);
      const top = clamp(rect.y, 16, viewport.height - panelHeight - 16);
      agentChatPanel.style.left = `${left}px`;
      agentChatPanel.style.top = `${top}px`;
    }

    function renderAgentChat(scrollToBottom = false) {
      const card = getCardById(chatCardId);
      if (!card || card.type !== "agent") {
        agentChatPanel.classList.add("hidden");
        return;
      }
      const session = getAgentSessionState(card.id);
      const before = agentChatHistory.scrollHeight - agentChatHistory.scrollTop - agentChatHistory.clientHeight;
      agentChatTitleText.textContent = card.meta.title || TYPE_LABELS.agent;
      agentChatSubtitle.textContent = `${card.meta.sessionKey} · ${getGatewayStatusLabel(gateway.status)} · ${card.meta.status}`;
      positionAgentChatPanel(card);
      if (!session.messages.length) {
        agentChatHistory.innerHTML = '<div class="chat-empty">双击 Agent 卡片后即可在这里聊天。</div>';
      } else {
        agentChatHistory.innerHTML = session.messages
          .map(
            (message) =>
              `<div class="chat-message ${message.role}">${escapeHtml(message.content || (message.role === "assistant" ? "..." : ""))}</div>`
          )
          .join("");
      }
      const shouldStick = scrollToBottom || before < 48;
      if (shouldStick) {
        agentChatHistory.scrollTop = agentChatHistory.scrollHeight;
      }
      updateGatewayUi();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function appendSessionMessage(cardId, message) {
      const session = getAgentSessionState(cardId);
      session.messages.push({
        id: message.id || createId(),
        role: message.role,
        content: message.content || "",
      });
      if (chatCardId === cardId) {
        renderAgentChat(true);
      }
    }

    function upsertStreamingAssistantMessage(cardId, content) {
      const session = getAgentSessionState(cardId);
      if (!session.currentAssistantMessageId) {
        session.currentAssistantMessageId = createId();
        session.messages.push({
          id: session.currentAssistantMessageId,
          role: "assistant",
          content: "",
        });
      }
      session.currentAssistantText = mergeStreamContent(session.currentAssistantText, content || "");
      const target = session.messages.find((message) => message.id === session.currentAssistantMessageId);
      if (target) {
        target.content = session.currentAssistantText;
      }
      if (chatCardId === cardId) {
        renderAgentChat(true);
      }
    }

    function finalizeStreamingAssistant(cardId) {
      const session = getAgentSessionState(cardId);
      const finalText = session.currentAssistantText.trim();
      session.currentAssistantMessageId = null;
      session.currentAssistantText = "";
      return finalText;
    }

    function scheduleAgentRunCompletion(card, requestToken, delay = 180) {
      const session = getAgentSessionState(card.id);
      if (session.streamFinalizeTimer) {
        window.clearTimeout(session.streamFinalizeTimer);
      }
      session.streamFinalizeTimer = window.setTimeout(() => {
        if (session.currentRequestToken === requestToken) {
          completeAgentRun(card, { propagate: !session.abortRequested });
        }
      }, delay);
    }

    function ensureAgentChatHistory(card) {
      if (!card || card.type !== "agent" || gateway.status !== "connected") {
        return;
      }
      const session = getAgentSessionState(card.id);
      if (session.historyLoaded || session.historyLoading) {
        return;
      }
      session.historyLoading = true;
      sendGatewayRequest("chat.history", {
        sessionKey: card.meta.sessionKey,
        limit: 50,
      })
        .then((result) => {
          const nextMessages = normalizeHistoryMessages(result);
          if (!session.messages.length) {
            session.messages = nextMessages;
          }
          session.historyLoaded = true;
        })
        .catch((error) => {
          gateway.detail = error.message || "加载历史失败";
        })
        .finally(() => {
          session.historyLoading = false;
          if (chatCardId === card.id) {
            renderAgentChat(true);
          }
        });
    }

    function openAgentChat(card) {
      if (!card || card.type !== "agent") {
        return;
      }
      chatCardId = card.id;
      positionAgentChatPanel(card);
      agentChatPanel.classList.remove("hidden");
      ensureAgentChatHistory(card);
      renderAgentChat(true);
      agentChatInput.focus();
    }

    function closeAgentChat() {
      chatCardId = null;
      agentChatPanel.classList.add("hidden");
    }

    function submitAgentChatMessage() {
      const card = getCardById(chatCardId);
      if (!card || card.type !== "agent") {
        return;
      }
      const message = agentChatInput.value.trim();
      if (!message) {
        return;
      }
      sendAgentMessage(card, message, {
        auto: false,
        displayMessage: message,
      });
      agentChatInput.value = "";
      updateGatewayUi();
    }

    function closeGatewaySocket(code = 1000, reason = "disconnect") {
      if (gateway.connectTimeoutId) {
        window.clearTimeout(gateway.connectTimeoutId);
        gateway.connectTimeoutId = null;
      }
      if (gateway.socket) {
        const socket = gateway.socket;
        gateway.socket = null;
        socket.close(code, reason);
      }
      for (const pending of gateway.pending.values()) {
        pending.reject(new Error("Gateway disconnected"));
      }
      gateway.pending.clear();
    }

    function connectGateway() {
      saveGatewaySettings();
      if (!gateway.settings.url) {
        setGatewayStatus("error", "Gateway URL 不能为空");
        return;
      }
      if (gateway.status === "connecting" || gateway.status === "connected") {
        return;
      }
      closeGatewaySocket();
      setGatewayStatus("connecting");
      try {
        const socket = new WebSocket(gateway.settings.url);
        gateway.socket = socket;
        socket.addEventListener("open", () => {
          const connectId = createId();
          gateway.pending.set(connectId, {
            method: "connect",
            resolve: () => {
              setGatewayStatus("connected");
              for (const card of state.cards.filter((item) => item.type === "agent")) {
                if (card.meta?.bufferedInputs?.length && card.meta.status !== "paused" && card.meta.status !== "running") {
                  processBufferedAgentInput(card);
                }
              }
              if (chatCardId) {
                ensureAgentChatHistory(getCardById(chatCardId));
                renderAgentChat(true);
              }
            },
            reject: (error) => {
              if (gateway.status === "connecting") {
                setGatewayStatus("error", error.message || "connect 握手失败");
              }
            },
          });
          gateway.connectTimeoutId = window.setTimeout(() => {
            if (gateway.pending.has(connectId)) {
              gateway.pending.get(connectId).reject(new Error("connect 握手超时"));
              gateway.pending.delete(connectId);
              closeGatewaySocket(1000, "connect timeout");
            }
          }, 8000);
          socket.send(
            JSON.stringify({
              type: "req",
              id: connectId,
              method: "connect",
              params: {
                auth: {
                  token: gateway.settings.token,
                },
                client: {
                  id: "meld-canvas",
                  version: "0.1.0",
                },
              },
            })
          );
        });
        socket.addEventListener("message", handleGatewayMessage);
        socket.addEventListener("close", () => {
          gateway.socket = null;
          if (gateway.status !== "error") {
            setGatewayStatus("disconnected", "连接已断开");
          }
        });
        socket.addEventListener("error", () => {
          setGatewayStatus("error", "WebSocket 连接失败");
        });
      } catch (error) {
        setGatewayStatus("error", error.message || "无法创建 WebSocket");
      }
    }

    function disconnectGateway() {
      closeGatewaySocket(1000, "manual disconnect");
      setGatewayStatus("disconnected", "已手动断开");
    }

    function sendGatewayRequest(method, params) {
      return new Promise((resolve, reject) => {
        if (gateway.status !== "connected" || !gateway.socket || gateway.socket.readyState !== WebSocket.OPEN) {
          reject(new Error("Gateway 未连接"));
          return;
        }
        const id = createId();
        gateway.pending.set(id, { method, resolve, reject });
        gateway.socket.send(
          JSON.stringify({
            type: "req",
            id,
            method,
            params,
          })
        );
      });
    }

    function handleGatewayMessage(event) {
      let payload;
      try {
        payload = JSON.parse(event.data);
      } catch (error) {
        return;
      }
      if (!payload || typeof payload !== "object") {
        return;
      }
      if (payload.type === "res" && typeof payload.id === "string") {
        const pending = gateway.pending.get(payload.id);
        if (!pending) {
          return;
        }
        gateway.pending.delete(payload.id);
        if (pending.method === "connect" && gateway.connectTimeoutId) {
          window.clearTimeout(gateway.connectTimeoutId);
          gateway.connectTimeoutId = null;
        }
        if (payload.error) {
          pending.reject(new Error(payload.error.message || payload.error || "请求失败"));
          return;
        }
        pending.resolve(payload.result);
        return;
      }
      if (payload.type === "evt" && payload.event === "chat" && payload.data) {
        const card = findAgentCardBySessionKey(payload.data.sessionKey);
        if (!card) {
          return;
        }
        const session = getAgentSessionState(card.id);
        const content =
          typeof payload.data.content === "string"
            ? payload.data.content
            : typeof payload.data.delta === "string"
              ? payload.data.delta
              : "";
        if (payload.data.role === "assistant") {
          if (!session.currentRequestToken && card.meta.status !== "running") {
            return;
          }
          setAgentStatus(card, "running");
          upsertStreamingAssistantMessage(card.id, content);
          if (payload.data.done === true || payload.data.final === true) {
            scheduleAgentRunCompletion(card, session.currentRequestToken, 0);
          } else if (session.responseReceived && session.currentRequestToken) {
            scheduleAgentRunCompletion(card, session.currentRequestToken, 180);
          }
        }
      }
    }

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function worldToScreen(x, y) {
      return {
        x: x * state.camera.zoom + state.camera.x,
        y: y * state.camera.zoom + state.camera.y,
      };
    }

    function screenToWorld(x, y) {
      return screenToWorldWithCamera(x, y, state.camera);
    }

    function screenToWorldWithCamera(x, y, camera) {
      return {
        x: (x - camera.x) / camera.zoom,
        y: (y - camera.y) / camera.zoom,
      };
    }

    function snapGrid(value) {
      return Math.round(value);
    }

    function getCardColor(type) {
      return CARD_COLORS[type] || CARD_COLORS.markdown;
    }

    function getCardById(cardId) {
      return state.cards.find((card) => card.id === cardId) || null;
    }

    function setCardContent(card, content) {
      if (!card) {
        return;
      }
      card.content = typeof content === "string" ? content : "";
      scheduleSave();
    }

    function setAgentStatus(card, status) {
      if (!card || card.type !== "agent") {
        return;
      }
      if (!AGENT_STATUSES.includes(status)) {
        return;
      }
      card.meta.status = status;
      scheduleSave();
      if (chatCardId === card.id) {
        renderAgentChat();
      }
    }

    function formatTimestamp(date = new Date()) {
      return date.toLocaleString("zh-CN", {
        hour12: false,
      });
    }

    function appendNoteEntry(card, content, sourceCard) {
      const sourceLabel = sourceCard?.meta?.title ? ` · ${sourceCard.meta.title}` : "";
      const entry = `### ${formatTimestamp()}${sourceLabel}\n\n${content}`;
      card.content = card.content?.trim() ? `${card.content.trim()}\n\n${entry}` : entry;
    }

    function buildPromptWithUpstreamContext(card, userMessage) {
      const upstreamCards = getAgentUpstreamCards(card.id);
      if (!upstreamCards.length) {
        return `[User message]\n${userMessage}`;
      }
      const contextBlocks = upstreamCards.map(
        (upstreamCard) => `Card "${upstreamCard.meta.title}" (${upstreamCard.type}):\n${upstreamCard.content || ""}`
      );
      return `[Context from upstream cards]\n---\n${contextBlocks.join("\n---\n\n")}\n---\n\n[User message]\n${userMessage}`;
    }

    function enqueueAgentInput(card, payload) {
      if (!card || card.type !== "agent") {
        return;
      }
      if (!Array.isArray(card.meta.bufferedInputs)) {
        card.meta.bufferedInputs = [];
      }
      const last = card.meta.bufferedInputs[card.meta.bufferedInputs.length - 1];
      if (last && last.message === payload.message && last.sourceCardId === payload.sourceCardId) {
        return;
      }
      card.meta.bufferedInputs.push({
        id: createId(),
        message: payload.message,
        sourceCardId: payload.sourceCardId || null,
        created: new Date().toISOString(),
      });
      scheduleSave();
      if (chatCardId === card.id) {
        renderAgentChat();
      }
    }

    function shiftAgentBufferedInput(card) {
      if (!card || card.type !== "agent" || !Array.isArray(card.meta.bufferedInputs) || !card.meta.bufferedInputs.length) {
        return null;
      }
      const nextPayload = card.meta.bufferedInputs.shift();
      scheduleSave();
      return nextPayload;
    }

    function sendAgentMessage(card, userMessage, options = {}) {
      if (!card || card.type !== "agent") {
        return;
      }
      const {
        auto = false,
        sourceCardId = null,
        displayMessage = userMessage,
      } = options;

      if (card.meta.status === "paused") {
        if (auto) {
          enqueueAgentInput(card, { message: userMessage, sourceCardId });
        } else {
          gateway.detail = "当前 Agent 已暂停";
          updateGatewayUi();
        }
        return;
      }

      if (gateway.status !== "connected") {
        if (auto) {
          enqueueAgentInput(card, { message: userMessage, sourceCardId });
        } else {
          gateway.detail = "请先连接 Gateway";
          updateGatewayUi();
        }
        return;
      }

      if (card.meta.status === "running") {
        enqueueAgentInput(card, { message: userMessage, sourceCardId });
        if (!auto) {
          appendSessionMessage(card.id, {
            role: "meta",
            content: "上一轮尚未结束，消息已加入队列。",
          });
        }
        return;
      }

      const session = getAgentSessionState(card.id);
      const prompt = buildPromptWithUpstreamContext(card, userMessage);
      const requestToken = createId();
      session.abortRequested = false;
      session.currentRequestToken = requestToken;
      session.responseReceived = false;
      if (session.streamFinalizeTimer) {
        window.clearTimeout(session.streamFinalizeTimer);
        session.streamFinalizeTimer = null;
      }
      appendSessionMessage(card.id, {
        role: "user",
        content: displayMessage,
      });
      setAgentStatus(card, "running");
      sendGatewayRequest("chat.send", {
        sessionKey: card.meta.sessionKey,
        message: prompt,
        deliver: false,
        idempotencyKey: requestToken,
      })
        .then(() => {
          if (session.currentRequestToken !== requestToken) {
            return;
          }
          session.responseReceived = true;
          scheduleAgentRunCompletion(card, requestToken, session.currentAssistantText ? 180 : 40);
        })
        .catch((error) => {
          if (session.currentRequestToken !== requestToken) {
            return;
          }
          setAgentStatus(card, "idle");
          if (session.streamFinalizeTimer) {
            window.clearTimeout(session.streamFinalizeTimer);
            session.streamFinalizeTimer = null;
          }
          session.currentRequestToken = null;
          session.responseReceived = false;
          if (!session.abortRequested) {
            appendSessionMessage(card.id, {
              role: "meta",
              content: `请求失败：${error.message || "未知错误"}`,
            });
          }
        });
    }

    function processBufferedAgentInput(card) {
      if (!card || card.type !== "agent" || card.meta.status === "paused" || card.meta.status === "running") {
        return;
      }
      const nextPayload = shiftAgentBufferedInput(card);
      if (!nextPayload) {
        return;
      }
      const sourceCard = nextPayload.sourceCardId ? getCardById(nextPayload.sourceCardId) : null;
      const sourceTitle = sourceCard?.meta?.title || "上游卡片";
      sendAgentMessage(card, nextPayload.message, {
        auto: true,
        sourceCardId: nextPayload.sourceCardId,
        displayMessage: `自动触发：${sourceTitle}`,
      });
    }

    function propagateAgentOutput(card, output) {
      if (!card || card.type !== "agent") {
        return;
      }
      const trimmedOutput = typeof output === "string" ? output.trim() : "";
      if (!trimmedOutput) {
        return;
      }
      for (const pipe of getAgentDownstreamPipes(card.id)) {
        const downstreamCard = getCardById(pipe.to);
        if (!downstreamCard) {
          continue;
        }
        effects.pipeFlashes.set(pipe.id, performance.now());
        if (downstreamCard.type === "note") {
          appendNoteEntry(downstreamCard, trimmedOutput, card);
          continue;
        }
        if (downstreamCard.type === "file" || downstreamCard.type === "markdown") {
          setCardContent(downstreamCard, trimmedOutput);
          continue;
        }
        if (downstreamCard.type === "agent") {
          enqueueAgentInput(downstreamCard, {
            message: `请处理来自上游 Agent "${card.meta.title}" 的最新输出，并继续向下游传播你的结果。`,
            sourceCardId: card.id,
          });
          processBufferedAgentInput(downstreamCard);
        }
      }
      scheduleSave();
    }

    function completeAgentRun(card, options = {}) {
      if (!card || card.type !== "agent") {
        return;
      }
      const { propagate = true } = options;
      const session = getAgentSessionState(card.id);
      const finalText = finalizeStreamingAssistant(card.id);
      session.currentRequestToken = null;
      session.responseReceived = false;
      if (session.streamFinalizeTimer) {
        window.clearTimeout(session.streamFinalizeTimer);
        session.streamFinalizeTimer = null;
      }
      const nextStatus = card.meta.status === "paused" ? "paused" : "idle";
      setAgentStatus(card, nextStatus);
      if (finalText) {
        card.content = finalText;
        scheduleSave();
        if (propagate && !session.abortRequested) {
          propagateAgentOutput(card, finalText);
        }
      }
      session.abortRequested = false;
      if (card.meta.status !== "paused") {
        processBufferedAgentInput(card);
      }
    }

    function abortAgentRun(card, nextStatus = "idle") {
      if (!card || card.type !== "agent") {
        return;
      }
      const session = getAgentSessionState(card.id);
      session.abortRequested = true;
      session.currentRequestToken = null;
      session.responseReceived = false;
      if (session.streamFinalizeTimer) {
        window.clearTimeout(session.streamFinalizeTimer);
        session.streamFinalizeTimer = null;
      }
      if (gateway.status === "connected") {
        sendGatewayRequest("chat.abort", {
          sessionKey: card.meta.sessionKey,
        }).catch(() => undefined);
      }
      const finalText = finalizeStreamingAssistant(card.id);
      if (finalText) {
        card.content = finalText;
        scheduleSave();
      }
      setAgentStatus(card, nextStatus);
    }

    function toggleAgentPause(card) {
      if (!card || card.type !== "agent") {
        return;
      }
      if (card.meta.status === "paused") {
        setAgentStatus(card, "idle");
        processBufferedAgentInput(card);
        return;
      }
      if (card.meta.status === "running") {
        abortAgentRun(card, "paused");
        return;
      }
      setAgentStatus(card, "paused");
    }

    function getPipeById(pipeId) {
      return state.pipes.find((pipe) => pipe.id === pipeId) || null;
    }

    function getCardWorldRect(card) {
      return {
        x: card.position.x * GRID_SIZE,
        y: card.position.y * GRID_SIZE,
        width: card.size.w * GRID_SIZE,
        height: card.size.h * GRID_SIZE,
      };
    }

    function getCardScreenRect(card) {
      const worldRect = getCardWorldRect(card);
      const topLeft = worldToScreen(worldRect.x, worldRect.y);
      return {
        x: topLeft.x,
        y: topLeft.y,
        width: worldRect.width * state.camera.zoom,
        height: worldRect.height * state.camera.zoom,
      };
    }

    function getPortScreenPosition(card, kind) {
      const rect = getCardScreenRect(card);
      return {
        x: kind === "input" ? rect.x : rect.x + rect.width,
        y: rect.y + rect.height / 2,
      };
    }

    function getAgentPauseButtonRect(card) {
      if (!card || card.type !== "agent") {
        return null;
      }
      const rect = getCardScreenRect(card);
      const size = clamp(18 * state.camera.zoom, 16, 20);
      const padding = clamp(12 * state.camera.zoom, 10, 16);
      return {
        x: rect.x + rect.width - padding - size,
        y: rect.y + rect.height - padding - size,
        width: size,
        height: size,
      };
    }

    function hitTestAgentControl(x, y) {
      for (let index = state.cards.length - 1; index >= 0; index -= 1) {
        const card = state.cards[index];
        if (card.type !== "agent") {
          continue;
        }
        const buttonRect = getAgentPauseButtonRect(card);
        if (buttonRect && isPointInRect(x, y, buttonRect)) {
          return { card, control: "pause-toggle" };
        }
      }
      return null;
    }

    function isPointInRect(x, y, rect) {
      return x >= rect.x && x <= rect.x + rect.width && y >= rect.y && y <= rect.y + rect.height;
    }

    function getPortVisualRadius(cardId, kind) {
      return hover.cardId === cardId && hover.kind === kind ? 4 : 3;
    }

    function bringCardToFront(cardId) {
      const index = state.cards.findIndex((card) => card.id === cardId);
      if (index < 0 || index === state.cards.length - 1) {
        return;
      }
      const [card] = state.cards.splice(index, 1);
      state.cards.push(card);
    }

    function selectCard(cardId) {
      selection.type = cardId ? "card" : null;
      selection.id = cardId || null;
    }

    function selectPipe(pipeId) {
      selection.type = pipeId ? "pipe" : null;
      selection.id = pipeId || null;
    }

    function clearSelection() {
      selection.type = null;
      selection.id = null;
    }

    function hitTestCard(x, y) {
      for (let index = state.cards.length - 1; index >= 0; index -= 1) {
        const card = state.cards[index];
        if (isPointInRect(x, y, getCardScreenRect(card))) {
          return card;
        }
      }
      return null;
    }

    function hitTestPort(x, y) {
      const radius = 12;
      for (let index = state.cards.length - 1; index >= 0; index -= 1) {
        const card = state.cards[index];
        const input = getPortScreenPosition(card, "input");
        const output = getPortScreenPosition(card, "output");
        if (Math.hypot(x - output.x, y - output.y) <= radius) {
          return { card, kind: "output" };
        }
        if (Math.hypot(x - input.x, y - input.y) <= radius) {
          return { card, kind: "input" };
        }
      }
      return null;
    }

    function getPipeCurve(from, to) {
      const distance = Math.abs(to.x - from.x);
      const controlOffset = clamp(distance * 0.5, 48, 180);
      return {
        p0: from,
        p1: { x: from.x + controlOffset, y: from.y },
        p2: { x: to.x - controlOffset, y: to.y },
        p3: to,
      };
    }

    function getBezierPoint(curve, t) {
      const inverse = 1 - t;
      return {
        x:
          inverse * inverse * inverse * curve.p0.x +
          3 * inverse * inverse * t * curve.p1.x +
          3 * inverse * t * t * curve.p2.x +
          t * t * t * curve.p3.x,
        y:
          inverse * inverse * inverse * curve.p0.y +
          3 * inverse * inverse * t * curve.p1.y +
          3 * inverse * t * t * curve.p2.y +
          t * t * t * curve.p3.y,
      };
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const lengthSquared = abx * abx + aby * aby;
      if (!lengthSquared) {
        return Math.hypot(px - ax, py - ay);
      }
      const t = clamp(((px - ax) * abx + (py - ay) * aby) / lengthSquared, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function hitTestPipe(x, y) {
      for (let index = state.pipes.length - 1; index >= 0; index -= 1) {
        const pipe = state.pipes[index];
        const fromCard = getCardById(pipe.from);
        const toCard = getCardById(pipe.to);
        if (!fromCard || !toCard) {
          continue;
        }

        const curve = getPipeCurve(getPortScreenPosition(fromCard, "output"), getPortScreenPosition(toCard, "input"));
        let previous = curve.p0;
        let closestDistance = Infinity;
        for (let step = 1; step <= 24; step += 1) {
          const point = getBezierPoint(curve, step / 24);
          closestDistance = Math.min(
            closestDistance,
            pointToSegmentDistance(x, y, previous.x, previous.y, point.x, point.y)
          );
          previous = point;
        }

        if (closestDistance <= PIPE_HIT_THRESHOLD) {
          return pipe;
        }
      }
      return null;
    }

    function parseNoteItemCount(text) {
      const lines = text
        .replace(/\r/g, "")
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);
      const markdownItems = lines.filter((line) => /^([-*+]|\d+\.)\s+/.test(line));
      return markdownItems.length || lines.length || 0;
    }

    function createCard(type, gridPosition) {
      const cardId = createId();
      const card = {
        id: cardId,
        type,
        position: {
          x: gridPosition.x,
          y: gridPosition.y,
        },
        size: { ...DEFAULT_CARD_SIZE },
        content: TYPE_DEFAULT_CONTENT[type],
        meta: {
          title: TYPE_LABELS[type],
          created: new Date().toISOString(),
          status: "idle",
          sessionKey: type === "agent" ? buildAgentSessionKey(cardId) : null,
          bufferedInputs: type === "agent" ? [] : [],
        },
      };
      state.cards.push(card);
      effects.cardEntrances.set(card.id, performance.now());
      selectCard(card.id);
      bringCardToFront(card.id);
      scheduleSave();
      return card;
    }

    function createPipe(fromCardId, toCardId) {
      if (fromCardId === toCardId) {
        return null;
      }

      const existingPipe = state.pipes.find((pipe) => pipe.from === fromCardId && pipe.to === toCardId);
      if (existingPipe) {
        return existingPipe;
      }

      const pipe = {
        id: createId(),
        from: fromCardId,
        to: toCardId,
        active: true,
      };
      state.pipes.push(pipe);
      effects.pipeFlashes.set(pipe.id, performance.now());
      scheduleSave();
      return pipe;
    }

    function deletePipe(pipeId) {
      const index = state.pipes.findIndex((pipe) => pipe.id === pipeId);
      if (index < 0) {
        return;
      }
      state.pipes.splice(index, 1);
      effects.pipeFlashes.delete(pipeId);
      if (selection.type === "pipe" && selection.id === pipeId) {
        clearSelection();
      }
      scheduleSave();
    }

    function deleteCard(cardId) {
      const cardIndex = state.cards.findIndex((card) => card.id === cardId);
      if (cardIndex < 0) {
        return;
      }

      state.cards.splice(cardIndex, 1);
      state.pipes = state.pipes.filter((pipe) => pipe.from !== cardId && pipe.to !== cardId);
      effects.cardEntrances.delete(cardId);
      for (const pipeId of [...effects.pipeFlashes.keys()]) {
        if (!getPipeById(pipeId)) {
          effects.pipeFlashes.delete(pipeId);
        }
      }

      if (selection.type === "card" && selection.id === cardId) {
        clearSelection();
      }
      if (selection.type === "pipe" && selection.id && !getPipeById(selection.id)) {
        clearSelection();
      }
      if (editorCardId === cardId) {
        closeEditor(false);
      }
      if (chatCardId === cardId) {
        closeAgentChat();
      }
      agentSessions.delete(cardId);

      hideContextMenu();
      scheduleSave();
    }

    function resizeCanvas() {
      viewport.width = window.innerWidth;
      viewport.height = window.innerHeight;
      viewport.dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(viewport.width * viewport.dpr);
      canvas.height = Math.floor(viewport.height * viewport.dpr);
      canvas.style.width = `${viewport.width}px`;
      canvas.style.height = `${viewport.height}px`;
    }

    function updateHoverState(x, y) {
      const portHit = hitTestPort(x, y);
      hover.cardId = portHit?.card.id || null;
      hover.kind = portHit?.kind || null;
    }

    function updateCursor(x, y) {
      updateHoverState(x, y);

      if (interaction.mode === "pan" || interaction.mode === "drag-card") {
        canvas.style.cursor = "grabbing";
        return;
      }

      if (interaction.mode === "connect") {
        canvas.style.cursor = "crosshair";
        return;
      }

      const agentControlHit = hitTestAgentControl(x, y);
      if (agentControlHit) {
        canvas.style.cursor = "pointer";
        return;
      }

      const portHit = hitTestPort(x, y);
      if (portHit) {
        canvas.style.cursor = "crosshair";
        return;
      }

      const cardHit = hitTestCard(x, y);
      const pipeHit = !cardHit ? hitTestPipe(x, y) : null;
      canvas.style.cursor = cardHit ? "grab" : pipeHit ? "pointer" : "default";
    }

    function showContextMenu(screenX, screenY, gridPosition, cardId = null) {
      contextMenuState = { gridPosition, cardId };
      const hasCard = Boolean(cardId);
      contextMenuTitle.textContent = hasCard ? "卡片操作" : "创建卡片";
      deleteDivider.classList.toggle("hidden", !hasCard);
      deleteCardButton.classList.toggle("hidden", !hasCard);
      contextMenu.classList.remove("hidden");

      const estimatedHeight = hasCard ? 290 : 236;
      const estimatedWidth = 212;
      contextMenu.style.left = `${Math.min(screenX, viewport.width - estimatedWidth - 12)}px`;
      contextMenu.style.top = `${Math.min(screenY, viewport.height - estimatedHeight - 12)}px`;
    }

    function hideContextMenu() {
      contextMenuState = null;
      contextMenu.classList.add("hidden");
    }

    function openEditor(card) {
      if (!card || card.type !== "markdown") {
        return;
      }

      const cardRect = getCardScreenRect(card);
      const panelWidth = clamp(Math.max(cardRect.width, 360), 360, 560);
      const panelHeight = clamp(Math.max(cardRect.height + 120, 280), 280, viewport.height - 32);
      const panelLeft = clamp(cardRect.x, 16, viewport.width - panelWidth - 16);
      const panelTop = clamp(cardRect.y, 16, viewport.height - panelHeight - 16);

      editorCardId = card.id;
      editorTitle.textContent = `${card.meta.title} 编辑`;
      editorText.value = card.content;
      editorPanel.style.width = `${panelWidth}px`;
      editorPanel.style.height = `${panelHeight}px`;
      editorPanel.style.left = `${panelLeft}px`;
      editorPanel.style.top = `${panelTop}px`;
      editorOverlay.classList.remove("hidden");
      editorText.focus();
      editorText.select();
    }

    function closeEditor(save) {
      if (save && editorCardId) {
        const card = getCardById(editorCardId);
        if (card) {
          card.content = editorText.value;
          scheduleSave();
        }
      }
      editorCardId = null;
      editorOverlay.classList.add("hidden");
    }

    function drawRoundedRect(x, y, width, height, radius) {
      const safeRadius = Math.max(0, Math.min(radius, width / 2, height / 2));
      ctx.beginPath();
      ctx.moveTo(x + safeRadius, y);
      ctx.arcTo(x + width, y, x + width, y + height, safeRadius);
      ctx.arcTo(x + width, y + height, x, y + height, safeRadius);
      ctx.arcTo(x, y + height, x, y, safeRadius);
      ctx.arcTo(x, y, x + width, y, safeRadius);
      ctx.closePath();
    }

    function drawGrid() {
      const leftWorld = (0 - state.camera.x) / state.camera.zoom;
      const rightWorld = (viewport.width - state.camera.x) / state.camera.zoom;
      const topWorld = (0 - state.camera.y) / state.camera.zoom;
      const bottomWorld = (viewport.height - state.camera.y) / state.camera.zoom;

      const startX = Math.floor(leftWorld / GRID_SIZE) * GRID_SIZE;
      const endX = Math.ceil(rightWorld / GRID_SIZE) * GRID_SIZE;
      const startY = Math.floor(topWorld / GRID_SIZE) * GRID_SIZE;
      const endY = Math.ceil(bottomWorld / GRID_SIZE) * GRID_SIZE;

      ctx.fillStyle = "#2a2a2a";
      for (let x = startX; x <= endX; x += GRID_SIZE) {
        for (let y = startY; y <= endY; y += GRID_SIZE) {
          const screen = worldToScreen(x, y);
          ctx.beginPath();
          ctx.arc(screen.x, screen.y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function buildPipePath(from, to) {
      const curve = getPipeCurve(from, to);
      ctx.beginPath();
      ctx.moveTo(curve.p0.x, curve.p0.y);
      ctx.bezierCurveTo(curve.p1.x, curve.p1.y, curve.p2.x, curve.p2.y, curve.p3.x, curve.p3.y);
      return curve;
    }

    function drawBezierPipe(from, to, options) {
      const {
        active = true,
        temporary = false,
        startColor = "#ffffff",
        endColor = "#ffffff",
        selected = false,
        timestamp = 0,
        flashProgress = null,
      } = options;

      const pulse = active ? 0.55 + 0.45 * Math.sin(timestamp * 0.004) : 0.5;
      const gradient = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
      gradient.addColorStop(0, startColor);
      gradient.addColorStop(1, endColor);

      ctx.save();
      buildPipePath(from, to);
      ctx.lineCap = "round";
      ctx.lineWidth = temporary ? 2 : 2.1 + pulse * 0.85;
      ctx.strokeStyle = gradient;
      ctx.globalAlpha = temporary ? 0.85 : 0.7 + pulse * 0.2;
      if (temporary) {
        ctx.setLineDash([8, 6]);
      }
      ctx.stroke();

      if (selected) {
        ctx.globalAlpha = 1;
        ctx.setLineDash([]);
        buildPipePath(from, to);
        ctx.lineWidth = temporary ? 4 : 5;
        ctx.strokeStyle = "rgba(96, 165, 250, 0.42)";
        ctx.stroke();
      }

      if (flashProgress !== null && flashProgress < 1) {
        const intensity = 1 - flashProgress;
        buildPipePath(from, to);
        ctx.setLineDash([]);
        ctx.globalAlpha = 0.8 * intensity;
        ctx.lineWidth = 4 + intensity * 5;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.95)";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "rgba(255, 255, 255, 0.8)";
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawPipes(timestamp) {
      for (const pipe of state.pipes) {
        const fromCard = getCardById(pipe.from);
        const toCard = getCardById(pipe.to);
        if (!fromCard || !toCard) {
          continue;
        }

        const flashStart = effects.pipeFlashes.get(pipe.id);
        let flashProgress = null;
        if (typeof flashStart === "number") {
          flashProgress = clamp((timestamp - flashStart) / 240, 0, 1);
          if (flashProgress >= 1) {
            effects.pipeFlashes.delete(pipe.id);
            flashProgress = null;
          }
        }

        drawBezierPipe(getPortScreenPosition(fromCard, "output"), getPortScreenPosition(toCard, "input"), {
          active: pipe.active,
          temporary: false,
          startColor: getCardColor(fromCard.type),
          endColor: getCardColor(toCard.type),
          selected: selection.type === "pipe" && selection.id === pipe.id,
          timestamp: timestamp + fromCard.position.x * 31 + toCard.position.y * 17,
          flashProgress,
        });
      }

      if (interaction.mode === "connect" && interaction.fromCardId) {
        const fromCard = getCardById(interaction.fromCardId);
        if (fromCard) {
          drawBezierPipe(getPortScreenPosition(fromCard, "output"), { x: interaction.pointerX, y: interaction.pointerY }, {
            active: true,
            temporary: true,
            startColor: getCardColor(fromCard.type),
            endColor: "rgba(255, 255, 255, 0.82)",
            selected: false,
            timestamp,
          });
        }
      }
    }

    function fitTextWithEllipsis(text, maxWidth) {
      if (ctx.measureText(text).width <= maxWidth) {
        return text;
      }
      let trimmed = text;
      while (trimmed.length > 0 && ctx.measureText(`${trimmed}...`).width > maxWidth) {
        trimmed = trimmed.slice(0, -1);
      }
      return trimmed ? `${trimmed}...` : "...";
    }

    function buildWrappedLines(text, maxWidth, maxLines) {
      const lines = [];
      const paragraphs = text.replace(/\r/g, "").split("\n");

      for (const paragraph of paragraphs) {
        if (!paragraph.length) {
          lines.push("");
          if (lines.length >= maxLines) {
            return lines.slice(0, maxLines);
          }
          continue;
        }

        const words = paragraph.split(/\s+/);
        let line = "";

        for (const word of words) {
          const candidate = line ? `${line} ${word}` : word;
          if (ctx.measureText(candidate).width <= maxWidth) {
            line = candidate;
            continue;
          }

          if (line) {
            lines.push(line);
            if (lines.length >= maxLines) {
              lines[maxLines - 1] = fitTextWithEllipsis(lines[maxLines - 1], maxWidth);
              return lines.slice(0, maxLines);
            }
            line = "";
          }

          if (ctx.measureText(word).width <= maxWidth) {
            line = word;
            continue;
          }

          let chunk = "";
          for (const char of word) {
            const nextChunk = chunk + char;
            if (ctx.measureText(nextChunk).width <= maxWidth || !chunk.length) {
              chunk = nextChunk;
              continue;
            }

            lines.push(chunk);
            if (lines.length >= maxLines) {
              lines[maxLines - 1] = fitTextWithEllipsis(lines[maxLines - 1], maxWidth);
              return lines.slice(0, maxLines);
            }
            chunk = char;
          }
          line = chunk;
        }

        if (line || words.length === 0) {
          lines.push(line);
          if (lines.length >= maxLines) {
            return lines.slice(0, maxLines);
          }
        }
      }

      return lines;
    }

    function drawBadge(text, x, y, background, color) {
      ctx.save();
      ctx.font = "600 10px system-ui";
      const width = ctx.measureText(text).width + 12;
      const height = 18;
      drawRoundedRect(x - width, y, width, height, 9);
      ctx.fillStyle = background;
      ctx.fill();
      ctx.fillStyle = color;
      ctx.textBaseline = "middle";
      ctx.fillText(text, x - width + 6, y + height / 2);
      ctx.restore();
    }

    function drawAgentStatusBadge(status, x, y, timestamp) {
      const dotColor = AGENT_STATUS_COLORS[status] || AGENT_STATUS_COLORS.idle;
      const text = status;
      const pulse = status === "running" ? 0.45 + 0.55 * ((Math.sin(timestamp * 0.006) + 1) / 2) : 0;
      ctx.save();
      ctx.font = "600 10px system-ui";
      const width = ctx.measureText(text).width + 22;
      const height = 18;
      drawRoundedRect(x - width, y, width, height, 9);
      ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x - width + 9, y + height / 2, 3.5 + pulse * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = dotColor;
      if (status === "running") {
        ctx.shadowBlur = 12 + pulse * 8;
        ctx.shadowColor = `${dotColor}cc`;
      }
      ctx.fill();
      ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
      ctx.shadowColor = "transparent";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x - width + 16, y + height / 2);
      ctx.restore();
    }

    function drawAgentConnectionDot(card, rect, paddingX, paddingY, timestamp) {
      const color = GATEWAY_STATUS_COLORS[gateway.status] || GATEWAY_STATUS_COLORS.disconnected;
      const pulse = gateway.status === "connecting" ? 0.4 + 0.6 * ((Math.sin(timestamp * 0.008) + 1) / 2) : 0;
      ctx.save();
      ctx.beginPath();
      ctx.arc(rect.x + paddingX + 4, rect.y + paddingY + 5, 4 + pulse * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowBlur = 10 + pulse * 8;
      ctx.shadowColor = `${color}cc`;
      ctx.fill();
      ctx.restore();
    }

    function drawAgentPauseButton(card) {
      const rect = getAgentPauseButtonRect(card);
      if (!rect) {
        return;
      }
      const active = card.meta.status === "paused";
      ctx.save();
      drawRoundedRect(rect.x, rect.y, rect.width, rect.height, 6);
      ctx.fillStyle = active ? "rgba(96, 165, 250, 0.18)" : "rgba(255, 255, 255, 0.06)";
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = active ? "rgba(96, 165, 250, 0.35)" : "rgba(255, 255, 255, 0.08)";
      ctx.stroke();
      ctx.fillStyle = active ? "#93c5fd" : "rgba(255, 255, 255, 0.84)";
      if (active) {
        ctx.beginPath();
        ctx.moveTo(rect.x + rect.width * 0.4, rect.y + rect.height * 0.28);
        ctx.lineTo(rect.x + rect.width * 0.4, rect.y + rect.height * 0.72);
        ctx.lineTo(rect.x + rect.width * 0.72, rect.y + rect.height * 0.5);
        ctx.closePath();
        ctx.fill();
      } else {
        const barWidth = Math.max(2, rect.width * 0.14);
        const barHeight = rect.height * 0.42;
        const top = rect.y + (rect.height - barHeight) / 2;
        ctx.fillRect(rect.x + rect.width * 0.32, top, barWidth, barHeight);
        ctx.fillRect(rect.x + rect.width * 0.54, top, barWidth, barHeight);
      }
      ctx.restore();
    }

    function drawCard(card, timestamp) {
      const rect = getCardScreenRect(card);
      const color = getCardColor(card.type);
      const radius = 8;
      const stripHeight = 4;
      const paddingX = clamp(12 * state.camera.zoom, 10, 16);
      const paddingY = clamp(11 * state.camera.zoom, 9, 15);
      const titleFontSize = clamp(13 * state.camera.zoom, 11, 15);
      const bodyFontSize = clamp(12 * state.camera.zoom, 10, 14);
      const bodyLineHeight = bodyFontSize * 1.5;
      const labelFontSize = clamp(10 * state.camera.zoom, 9, 11);
      const bodyTop = rect.y + paddingY + titleFontSize + 18;
      const bodyHeight = Math.max(24, rect.height - (bodyTop - rect.y) - paddingY);
      const maxLines = Math.max(1, Math.floor(bodyHeight / bodyLineHeight));
      const preview = card.content || TYPE_DEFAULT_CONTENT[card.type];
      const entranceStart = effects.cardEntrances.get(card.id);
      const badgeReservedWidth = card.type === "agent" ? 112 : card.type === "note" ? 28 : 0;
      const titleOffsetX = card.type === "agent" ? 14 : 0;

      ctx.save();
      if (typeof entranceStart === "number") {
        const progress = clamp((timestamp - entranceStart) / 200, 0, 1);
        const eased = easeOutCubic(progress);
        const scale = 0.8 + 0.2 * eased;
        const centerX = rect.x + rect.width / 2;
        const centerY = rect.y + rect.height / 2;
        ctx.translate(centerX, centerY);
        ctx.scale(scale, scale);
        ctx.translate(-centerX, -centerY);
        if (progress >= 1) {
          effects.cardEntrances.delete(card.id);
        }
      }

      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 2;
      ctx.shadowColor = "rgba(0, 0, 0, 0.15)";
      drawRoundedRect(rect.x, rect.y, rect.width, rect.height, radius);
      ctx.fillStyle = "#17171a";
      ctx.fill();

      ctx.shadowColor = "transparent";
      drawRoundedRect(rect.x, rect.y, rect.width, rect.height, radius);
      ctx.lineWidth = selection.type === "card" && selection.id === card.id ? 1.8 : 1;
      ctx.strokeStyle =
        selection.type === "card" && selection.id === card.id ? "#60a5fa" : "rgba(255, 255, 255, 0.08)";
      ctx.stroke();

      ctx.save();
      drawRoundedRect(rect.x, rect.y, rect.width, rect.height, radius);
      ctx.clip();
      ctx.fillStyle = color;
      ctx.fillRect(rect.x, rect.y, rect.width, stripHeight);
      ctx.restore();

      ctx.fillStyle = "rgba(255, 255, 255, 0.94)";
      ctx.font = `600 ${titleFontSize}px system-ui`;
      ctx.textBaseline = "top";
      ctx.fillText(
        fitTextWithEllipsis(card.meta.title, Math.max(20, rect.width - paddingX * 2 - badgeReservedWidth - titleOffsetX)),
        rect.x + paddingX + titleOffsetX,
        rect.y + paddingY
      );

      ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
      ctx.font = `600 ${labelFontSize}px system-ui`;
      ctx.fillText(card.type.toUpperCase(), rect.x + paddingX + titleOffsetX, rect.y + paddingY + titleFontSize + 4);

      if (card.type === "note") {
        drawBadge(`${parseNoteItemCount(card.content)}`, rect.x + rect.width - paddingX, rect.y + paddingY - 2, "rgba(139, 92, 246, 0.16)", "#d8b4fe");
      } else if (card.type === "agent") {
        drawAgentConnectionDot(card, rect, paddingX, paddingY, timestamp);
        drawAgentStatusBadge(card.meta.status || "idle", rect.x + rect.width - paddingX, rect.y + paddingY - 2, timestamp);
      }

      ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
      ctx.font = `${bodyFontSize}px system-ui`;
      const wrappedLines = buildWrappedLines(preview, Math.max(24, rect.width - paddingX * 2), maxLines);
      for (let index = 0; index < wrappedLines.length; index += 1) {
        ctx.fillText(wrappedLines[index], rect.x + paddingX, bodyTop + index * bodyLineHeight);
      }
      ctx.restore();

      drawPort(card, "input");
      drawPort(card, "output");
      if (card.type === "agent") {
        drawAgentPauseButton(card);
      }
    }

    function drawPort(card, kind) {
      const port = getPortScreenPosition(card, kind);
      const radius = getPortVisualRadius(card.id, kind);
      const color = getCardColor(card.type);
      const hovered = hover.cardId === card.id && hover.kind === kind;

      ctx.save();
      if (hovered) {
        ctx.shadowBlur = 12;
        ctx.shadowColor = `${color}aa`;
      }
      ctx.beginPath();
      ctx.arc(port.x, port.y, radius, 0, Math.PI * 2);
      if (kind === "output") {
        ctx.fillStyle = color;
        ctx.fill();
      } else {
        ctx.fillStyle = "#17171a";
        ctx.fill();
      }
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = color;
      ctx.stroke();
      ctx.restore();
    }

    function updateHud() {
      const nextText = `缩放 ${Math.round(state.camera.zoom * 100)}% · ${state.cards.length} 张卡片`;
      if (nextText !== hudText) {
        hudText = nextText;
        hud.textContent = nextText;
      }
    }

    function render(timestamp) {
      ctx.setTransform(viewport.dpr, 0, 0, viewport.dpr, 0, 0);
      ctx.clearRect(0, 0, viewport.width, viewport.height);
      ctx.fillStyle = "#0f0f0f";
      ctx.fillRect(0, 0, viewport.width, viewport.height);

      drawGrid();
      drawPipes(timestamp);
      for (const card of state.cards) {
        drawCard(card, timestamp);
      }

      if (chatCardId) {
        const chatCard = getCardById(chatCardId);
        if (chatCard) {
          positionAgentChatPanel(chatCard);
        }
