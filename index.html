          ? getCardEdgeAnchor(snappedTarget.card, startAnchor.point.x, startAnchor.point.y, snappedTarget.side)
          : null;
        const start = startAnchor.point;
        const end = endAnchor?.point || { x: interaction.connectPointerX, y: interaction.connectPointerY };
        const minControl = 80 * state.camera.zoom;
        const maxControl = 220 * state.camera.zoom;
        const delta = clamp(Math.max(minControl, distance(start.x, start.y, end.x, end.y) * 0.32), minControl, maxControl);
        const normal = getPortNormal(startAnchor.side);
        const endNormal = endAnchor ? getPortNormal(endAnchor.side) : { x: -normal.x, y: -normal.y };
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.bezierCurveTo(
          start.x + normal.x * delta,
          start.y + normal.y * delta,
          end.x + endNormal.x * delta * 0.55,
          end.y + endNormal.y * delta * 0.55,
          end.x,
          end.y
        );
        ctx.strokeStyle = "rgba(245, 158, 11, 0.75)";
        ctx.lineWidth = 4 * state.camera.zoom;
        ctx.setLineDash([10 * state.camera.zoom, 8 * state.camera.zoom]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function syncControlLayer() {
        const visibleIds = new Set();

        state.cards.forEach((card) => {
          if (card.type !== "markdown" && card.type !== "file" && card.type !== "agent" && card.type !== "note") {
            return;
          }
          // 交互按钮是独立 DOM，覆盖在 canvas 上层，浏览器自动化可直接 click。
          const rect = getCardScreenRect(card);
          let element = controlElements.get(card.id);
          if (!element) {
            element = createControlGroup(card);
            controlElements.set(card.id, element);
            controlsLayer.appendChild(element);
          }
          visibleIds.add(card.id);
          const runButton = element.querySelector('[data-action="run"]');
          if (runButton && (card.type === "markdown" || card.type === "file")) {
            runButton.classList.toggle("hidden", !hasDownstreamPipes(card.id));
          }
          updateControlGroupScale(element);
          const elementWidth = element.getBoundingClientRect().width || element.offsetWidth;
          const elementHeight = element.getBoundingClientRect().height || element.offsetHeight;
          const isVisible = rectVisible(rect);

          if (!isVisible) {
            element.classList.add("hidden");
            element.classList.remove("visible");
            return;
          }

          element.classList.remove("hidden");
          const offset = CARD_CONTROL_OFFSET * state.camera.zoom;
          element.style.left = `${Math.round(Math.min(rect.x + rect.w + offset, viewport.width - elementWidth - 8))}px`;
          element.style.top = `${Math.round(clamp(rect.y, 8, viewport.height - elementHeight - 8))}px`;
          element.classList.toggle("visible", shouldShowCardControls(card.id));

          element.querySelectorAll(".card-action").forEach((button) => {
            button.classList.toggle("is-paused", button.dataset.action === "pause-toggle" && card.status === "paused");
            button.classList.toggle("is-running", button.dataset.action === "run" && card.status === "running");
            if (button.dataset.action === "pause-toggle") {
              button.classList.toggle("hidden", card.status !== "running" && card.status !== "paused");
              button.textContent = card.status === "paused" ? "▶" : "⏸";
              button.title = card.status === "paused" ? "恢复 Agent" : "暂停 Agent";
              button.setAttribute("aria-label", button.title);
            }
          });
        });

        controlElements.forEach((node, id) => {
          if (!visibleIds.has(id)) {
            node.remove();
            controlElements.delete(id);
          }
        });
      }

      function createControlGroup(card) {
        const group = document.createElement("div");
        group.className = "card-controls";
        group.dataset.cardId = card.id;

        if (card.type === "markdown" || card.type === "file") {
          group.appendChild(createCardButton(card.id, "edit", "✏️", `编辑 ${TYPE_LABELS[card.type]}`));
          group.appendChild(createCardButton(card.id, "run", "▶", `运行 ${TYPE_LABELS[card.type]} 流程`));
        }

        if (card.type === "agent") {
          group.appendChild(createCardButton(card.id, "run", "▶", "运行 Agent"));
          group.appendChild(createCardButton(card.id, "pause-toggle", "⏸", "暂停 Agent"));
          group.appendChild(createCardButton(card.id, "chat", "💬", "打开聊天面板"));
        }

        if (card.type === "note") {
          group.appendChild(createCardButton(card.id, "clear", "🗑", "清空 Note 日志"));
        }

        return group;
      }

      function updateControlGroupScale(group) {
        const zoom = state.camera.zoom;
        const size = CARD_CONTROL_SIZE * zoom;
        group.style.gap = `${CARD_CONTROL_GAP * zoom}px`;
        group.querySelectorAll(".card-action").forEach((button) => {
          button.style.width = `${size}px`;
          button.style.height = `${size}px`;
          button.style.fontSize = `${Math.max(10, 12 * zoom)}px`;
          button.style.borderWidth = `${zoom}px`;
          button.style.boxShadow = `0 ${8 * zoom}px ${18 * zoom}px rgba(0, 0, 0, 0.28)`;
        });
      }

      function shouldShowCardControls(cardId) {
        return selectedCardId === cardId || hoveredCardId === cardId || hoveredControlCardId === cardId;
      }

      function syncPipeDeleteButton() {
        if (!selectedPipeId) {
          pipeDeleteButton.classList.add("hidden");
          return;
        }
        const pipe = state.pipes.find((item) => item.id === selectedPipeId);
        if (!pipe) {
          selectedPipeId = null;
          pipeDeleteButton.classList.add("hidden");
          return;
        }
        const curve = getPipeCurve(pipe.from, pipe.fromPort, pipe.to, pipe.toPort);
        if (!curve) {
          pipeDeleteButton.classList.add("hidden");
          return;
        }
        const midpoint = cubicBezierPoint(curve.p0, curve.p1, curve.p2, curve.p3, 0.5);
        const size = Math.max(20, 22 * state.camera.zoom);
        pipeDeleteButton.style.width = `${size}px`;
        pipeDeleteButton.style.height = `${size}px`;
        pipeDeleteButton.style.left = `${Math.round(midpoint.x - size / 2)}px`;
        pipeDeleteButton.style.top = `${Math.round(midpoint.y - size / 2)}px`;
        pipeDeleteButton.classList.remove("hidden");
      }

      function createCardButton(cardId, action, text, label) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "card-action";
        button.dataset.cardId = cardId;
        button.dataset.action = action;
        button.setAttribute("aria-label", label);
        button.title = label;
        button.textContent = text;
        return button;
      }

      function updateHUD() {
        hud.textContent = `缩放 ${Math.round(state.camera.zoom * 100)}% · ${state.cards.length} 张卡片 · ${state.pipes.length} 条管道 · ${GATEWAY_STATUS_LABELS[gateway.status]}`;
      }

      function selectCard(cardId) {
        selectedCardId = cardId;
        selectedPipeId = null;
      }

      function selectPipe(pipeId) {
        selectedPipeId = pipeId;
        selectedCardId = null;
        clearTapState();
      }

      function clearSelection() {
        selectedCardId = null;
        selectedPipeId = null;
      }

      function getCard(id) {
        return state.cards.find((card) => card.id === id) || null;
      }

      function getOutgoingPipes(cardId) {
        return state.pipes.filter((pipe) => pipe.from === cardId);
      }

      function getIncomingPipes(cardId) {
        return state.pipes.filter((pipe) => pipe.to === cardId);
      }

      function hasDownstreamPipes(cardId) {
        return state.pipes.some((pipe) => pipe.from === cardId);
      }

      function isTriggerCard(cardId) {
        const card = getCard(cardId);
        return !!card && (card.type === "markdown" || card.type === "file") && hasDownstreamPipes(cardId);
      }

      function getCardOutput(card) {
        return card.type === "agent" ? card.output || "" : card.content || "";
      }

      function markCardActive(cardId) {
        const card = getCard(cardId);
        if (!card) {
          return;
        }
        card.activeUntil = performance.now() + ACTIVE_MS;
      }

      function flashPipe(pipeId) {
        pipeActiveUntil.set(pipeId, performance.now() + ACTIVE_MS);
      }

      function isPipeActive(pipe, now) {
        const until = pipeActiveUntil.get(pipe.id) || 0;
        const from = getCard(pipe.from);
        const to = getCard(pipe.to);
        return now < until || from?.status === "running" || to?.status === "running";
      }

      function bringCardToFront(cardId) {
        const index = state.cards.findIndex((card) => card.id === cardId);
        if (index < 0 || index === state.cards.length - 1) {
          return;
        }
        const [card] = state.cards.splice(index, 1);
        state.cards.push(card);
      }

      function buildCardTitle(type) {
        const count = state.cards.filter((card) => card.type === type).length + 1;
        return `${TYPE_LABELS[type]} ${count}`;
      }

      function buildSessionKey(cardId) {
        return `meld-${cardId}`;
      }

      function getCardAtScreenPoint(screenX, screenY) {
        for (let index = state.cards.length - 1; index >= 0; index -= 1) {
          const card = state.cards[index];
          const rect = getCardScreenRect(card);
          if (screenX >= rect.x && screenX <= rect.x + rect.w && screenY >= rect.y && screenY <= rect.y + rect.h) {
            return card;
          }
        }
        return null;
      }

      function getTopmostPipeHit(screenX, screenY) {
        for (let index = state.pipes.length - 1; index >= 0; index -= 1) {
          const pipe = state.pipes[index];
          const curve = getPipeCurve(pipe.from, pipe.fromPort, pipe.to, pipe.toPort);
          if (!curve) {
            continue;
          }
          if (getDistanceToBezierCurve(curve, screenX, screenY) <= PIPE_SELECTION_THRESHOLD) {
            return pipe;
          }
        }
        return null;
      }

      function getPortDefinition(portId) {
        return CARD_PORTS.find((port) => port.id === portId) || null;
      }

      function normalizePipeAnchorId(portId, fallback) {
        if (PIPE_ANCHOR_IDS.has(portId)) {
          return portId;
        }
        return fallback;
      }

      function getPortSide(portId, fallback) {
        if (portId === "top" || portId === "right" || portId === "bottom" || portId === "left") {
          return portId;
        }
        return getPortDefinition(portId)?.side || fallback;
      }

      function getPortNormal(side) {
        if (side === "top") {
          return { x: 0, y: -1 };
        }
        if (side === "bottom") {
          return { x: 0, y: 1 };
        }
        if (side === "left") {
          return { x: -1, y: 0 };
        }
        return { x: 1, y: 0 };
      }

      function getCardHeaderHeight(rect) {
        return Math.min(CARD_BAND_HEIGHT * state.camera.zoom, rect.h);
      }

      function getDistanceToRectEdge(rect, screenX, screenY) {
        const insideX = screenX >= rect.x && screenX <= rect.x + rect.w;
        const insideY = screenY >= rect.y && screenY <= rect.y + rect.h;
        if (insideX && insideY) {
          return Math.min(
            screenX - rect.x,
            rect.x + rect.w - screenX,
            screenY - rect.y,
            rect.y + rect.h - screenY
          );
        }
        const closestX = clamp(screenX, rect.x, rect.x + rect.w);
        const closestY = clamp(screenY, rect.y, rect.y + rect.h);
        return distance(screenX, screenY, closestX, closestY);
      }

      function isPointInCardEdgeBand(card, screenX, screenY, band) {
        const rect = getCardScreenRect(card);
        if (screenX < rect.x || screenX > rect.x + rect.w || screenY < rect.y || screenY > rect.y + rect.h) {
          return false;
        }
        return getDistanceToRectEdge(rect, screenX, screenY) < band;
      }

      function isPointInCardCenter(card, screenX, screenY, inset) {
        const rect = getCardScreenRect(card);
        return (
          screenX > rect.x + inset &&
          screenX < rect.x + rect.w - inset &&
          screenY > rect.y + inset &&
          screenY < rect.y + rect.h - inset
        );
      }

      function getClosestCardEdgeSide(card, screenX, screenY) {
        const rect = getCardScreenRect(card);
        const distances = [
          { side: "top", value: Math.abs(screenY - rect.y) },
          { side: "right", value: Math.abs(screenX - (rect.x + rect.w)) },
          { side: "bottom", value: Math.abs(screenY - (rect.y + rect.h)) },
          { side: "left", value: Math.abs(screenX - rect.x) },
        ];
        distances.sort((a, b) => a.value - b.value);
        return distances[0]?.side || "right";
      }

      function getSnapCardTarget(screenX, screenY, excludeCardId) {
        let best = null;
        let bestScore = Infinity;
        for (let index = state.cards.length - 1; index >= 0; index -= 1) {
          const card = state.cards[index];
          if (card.id === excludeCardId) {
            continue;
          }
          const rect = getCardScreenRect(card);
          const edgeDistance = getDistanceToRectEdge(rect, screenX, screenY);
          if (edgeDistance >= CARD_SNAP_BAND) {
            continue;
          }
          const anchor = getCardEdgeAnchor(card, screenX, screenY, getClosestCardEdgeSide(card, screenX, screenY));
          const point = anchor.point;
          const score = edgeDistance * 8 + distance(screenX, screenY, point.x, point.y);
          if (score < bestScore) {
            best = { card, side: anchor.side, point };
            bestScore = score;
          }
        }
        return best;
      }

      function getPipeControlDistance(start, end, fromSide, toSide) {
        const total = distance(start.x, start.y, end.x, end.y);
        const horizontal = Math.abs(end.x - start.x);
        const vertical = Math.abs(end.y - start.y);
        const minControl = 80 * state.camera.zoom;
        const maxControl = 240 * state.camera.zoom;
        const axis = Math.max(
          fromSide === "left" || fromSide === "right" ? horizontal : vertical,
          toSide === "left" || toSide === "right" ? horizontal : vertical
        );
        return clamp(Math.max(minControl, axis * 0.55, total * 0.28), minControl, maxControl);
      }

      function getPipeCurve(fromCardId, fromPortId, toCardId, toPortId) {
        const fromCard = getCard(fromCardId);
        const toCard = getCard(toCardId);
        if (!fromCard || !toCard) {
          return null;
        }
        const toCenter = getRectCenter(getCardScreenRect(toCard));
        const fromCenter = getRectCenter(getCardScreenRect(fromCard));
        const startAnchor = getCardEdgeAnchor(fromCard, toCenter.x, toCenter.y, getPortSide(fromPortId, "right"));
        const endAnchor = getCardEdgeAnchor(toCard, fromCenter.x, fromCenter.y, getPortSide(toPortId, "left"));
        const p0 = startAnchor.point;
        const p3 = endAnchor.point;
        const delta = getPipeControlDistance(p0, p3, startAnchor.side, endAnchor.side);
        const startNormal = getPortNormal(startAnchor.side);
        const endNormal = getPortNormal(endAnchor.side);
        return {
          p0,
          p1: { x: p0.x + startNormal.x * delta, y: p0.y + startNormal.y * delta },
          p2: { x: p3.x + endNormal.x * delta, y: p3.y + endNormal.y * delta },
          p3,
        };
      }

      function getCardScreenRect(card) {
        const topLeft = worldToScreen(card.x, card.y);
        return {
          x: topLeft.x,
          y: topLeft.y,
          w: card.w * GRID_SIZE * state.camera.zoom,
          h: card.h * GRID_SIZE * state.camera.zoom,
        };
      }

      function getRectCenter(rect) {
        return {
          x: rect.x + rect.w / 2,
          y: rect.y + rect.h / 2,
        };
      }

      function getCardEdgeAnchor(card, targetX, targetY, fallbackSide) {
        const rect = getCardScreenRect(card);
        const center = getRectCenter(rect);
        const dx = targetX - center.x;
        const dy = targetY - center.y;
        const preferredSide = getPortSide(fallbackSide, "right");

        if (dx === 0 && dy === 0) {
          if (preferredSide === "top") {
            return { side: "top", point: { x: center.x, y: rect.y } };
          }
          if (preferredSide === "bottom") {
            return { side: "bottom", point: { x: center.x, y: rect.y + rect.h } };
          }
          if (preferredSide === "left") {
            return { side: "left", point: { x: rect.x, y: center.y } };
          }
          return { side: "right", point: { x: rect.x + rect.w, y: center.y } };
        }

        const scale = 1 / Math.max(Math.abs(dx) / (rect.w / 2), Math.abs(dy) / (rect.h / 2));
        const point = {
          x: center.x + dx * scale,
          y: center.y + dy * scale,
        };
        const side = getClosestCardEdgeSide(card, point.x, point.y);
        return {
          side,
          point: {
            x: clamp(point.x, rect.x, rect.x + rect.w),
            y: clamp(point.y, rect.y, rect.y + rect.h),
          },
        };
      }

      function getDistanceToBezierCurve(curve, x, y) {
        let best = Infinity;
        let previous = curve.p0;
        const segments = 32;
        for (let index = 1; index <= segments; index += 1) {
          const point = cubicBezierPoint(curve.p0, curve.p1, curve.p2, curve.p3, index / segments);
          best = Math.min(best, distanceToSegment(x, y, previous.x, previous.y, point.x, point.y));
          previous = point;
        }
        return best;
      }

      function distanceToSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        if (dx === 0 && dy === 0) {
          return distance(px, py, x1, y1);
        }
        const t = clamp(((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy), 0, 1);
        const closestX = x1 + dx * t;
        const closestY = y1 + dy * t;
        return distance(px, py, closestX, closestY);
      }

      function worldToScreen(x, y) {
        return {
          x: (x - state.camera.x) * state.camera.zoom + viewport.width / 2,
          y: (y - state.camera.y) * state.camera.zoom + viewport.height / 2,
        };
      }

      function screenToWorld(x, y) {
        return {
          x: (x - viewport.width / 2) / state.camera.zoom + state.camera.x,
          y: (y - viewport.height / 2) / state.camera.zoom + state.camera.y,
        };
      }

      function zoomAtPoint(screenX, screenY, nextZoom) {
        const world = screenToWorld(screenX, screenY);
        state.camera.zoom = nextZoom;
        state.camera.x = world.x - (screenX - viewport.width / 2) / nextZoom;
        state.camera.y = world.y - (screenY - viewport.height / 2) / nextZoom;
        scheduleSave();
      }

      function drawCardBody(card, rect, bandHeight) {
        const zoom = state.camera.zoom;
        const pad = 14 * zoom;
        const bodyX = rect.x + pad;
        let bodyY = rect.y + bandHeight + pad;
        const bodyWidth = rect.w - pad * 2;
        const bottomLimit = rect.y + rect.h - pad;

        if (card.type === "agent") {
          ctx.fillStyle = "rgba(17, 24, 39, 0.5)";
          ctx.font = `${CARD_META_FONT_SIZE * zoom}px Inter, system-ui, sans-serif`;
          ctx.textBaseline = "top";
          ctx.fillText(normalizeSessionKey(card.sessionKey), bodyX, bodyY, bodyWidth);
          bodyY += CARD_META_FONT_SIZE * zoom * 1.5 + 10 * zoom;
        }

        const bodyHeight = Math.max(0, bottomLimit - bodyY);
        drawTextBlock(getCardPreview(card), bodyX, bodyY, bodyWidth, bodyHeight, CARD_BODY_FONT_SIZE * zoom);
      }

      function getCardPreview(card) {
        if (card.type === "agent") {
          const summary = getAgentContextSummary(card.id);
          const reply = card.output.trim() || "等待运行...";
          return `上游 Context\n${summary}\n\nReply\n${reply}`;
        }
        return card.content || "";
      }

      function getAgentContextSummary(cardId) {
        const visited = new Set([cardId]);
        const entries = [];

        function visit(targetId) {
          getIncomingPipes(targetId).forEach((pipe) => {
            const source = getCard(pipe.from);
            if (!source || visited.has(source.id)) {
              return;
            }
            visited.add(source.id);
            visit(source.id);
            entries.push(source);
          });
        }

        visit(cardId);

        if (!entries.length) {
          return "(暂无上游)";
        }

        const summaryLines = entries.slice(-3).map((source) => {
          const text = getCardOutput(source).trim().replace(/\s+/g, " ");
          const snippet = text ? text.slice(0, 72) : "(empty)";
          return `${TYPE_LABELS[source.type]}: ${snippet}`;
        });
        const remaining = entries.length - summaryLines.length;
        return remaining > 0 ? `${summaryLines.join("\n")}\n+${remaining} 项` : summaryLines.join("\n");
      }

      function drawTextBlock(text, x, y, maxWidth, maxHeight, fontSize) {
        if (maxHeight <= 0 || maxWidth <= 0 || fontSize <= 0) {
          return;
        }
        const lineHeight = fontSize * 1.45;
        ctx.font = `${fontSize}px Inter, system-ui, sans-serif`;
        ctx.fillStyle = "rgba(17, 24, 39, 0.86)";
        ctx.textBaseline = "top";

        const lines = [];
        const paragraphs = String(text || "").split("\n");
        paragraphs.forEach((paragraph) => {
          if (!paragraph) {
            lines.push("");
            return;
          }
          const words = paragraph.split(/\s+/);
          let line = "";
          words.forEach((word) => {
            const test = line ? `${line} ${word}` : word;
            if (ctx.measureText(test).width > maxWidth && line) {
              lines.push(line);
              line = word;
            } else {
              line = test;
            }
          });
          lines.push(line);
        });

        const maxLines = Math.floor(maxHeight / lineHeight);
        if (maxLines <= 0) {
          return;
        }
        lines.slice(0, maxLines).forEach((line, index) => {
          const content = index === maxLines - 1 && lines.length > maxLines ? `${line.replace(/\s+$/, "")}...` : line;
          ctx.fillText(content, x, y + index * lineHeight, maxWidth);
        });
      }

      function beginConnection(cardId, portId, screenX, screenY, mode) {
        interaction.mode = mode;
        interaction.connectFromCardId = cardId;
        interaction.connectFromPortId = portId;
        interaction.connectPointerX = screenX;
        interaction.connectPointerY = screenY;
        interaction.connectTargetCardId = null;
        interaction.connectTargetPortId = null;
      }

      function openPrimaryCardAction(cardId) {
        const card = getCard(cardId);
        if (!card || card.type === "note") {
          return;
        }
        if (card.type === "agent") {
          openChatPanel(cardId);
          return;
        }
        openEditor(cardId);
      }

      function handleCardTap(card, screenX, screenY) {
        if (!isPointInCardCenter(card, screenX, screenY, CARD_CENTER_EDIT_INSET)) {
          clearTapState();
          return;
        }
        const now = performance.now();
        const sameCard = tapState.cardId === card.id;
        const closeEnough = distance(screenX, screenY, tapState.x, tapState.y) <= DOUBLE_TAP_DISTANCE;
        const quickEnough = now - tapState.time <= DOUBLE_TAP_MS;
        if (sameCard && closeEnough && quickEnough) {
          clearTapState();
          openPrimaryCardAction(card.id);
          return;
        }
        tapState.cardId = card.id;
        tapState.time = now;
        tapState.x = screenX;
        tapState.y = screenY;
      }

      function clearTapState() {
        tapState.cardId = null;
        tapState.time = 0;
        tapState.x = 0;
        tapState.y = 0;
      }

      function isTextInputTarget(target) {
        if (!target) {
          return false;
        }
        const tagName = target.tagName;
        return tagName === "INPUT" || tagName === "TEXTAREA" || target.isContentEditable;
      }

      function rectVisible(rect) {
        return rect.x + rect.w >= -120 && rect.y + rect.h >= -120 && rect.x <= viewport.width + 120 && rect.y <= viewport.height + 120;
      }

      function roundRectPath(context, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        context.moveTo(x + radius, y);
        context.arcTo(x + w, y, x + w, y + h, radius);
        context.arcTo(x + w, y + h, x, y + h, radius);
        context.arcTo(x, y + h, x, y, radius);
        context.arcTo(x, y, x + w, y, radius);
      }

      function cubicBezierPoint(p0, p1, p2, p3, t) {
        const it = 1 - t;
        return {
          x: it ** 3 * p0.x + 3 * it ** 2 * t * p1.x + 3 * it * t ** 2 * p2.x + t ** 3 * p3.x,
          y: it ** 3 * p0.y + 3 * it ** 2 * t * p1.y + 3 * it * t ** 2 * p2.y + t ** 3 * p3.y,
        };
      }

      function cubicBezierTangent(p0, p1, p2, p3, t) {
        const it = 1 - t;
        return {
          x: 3 * it ** 2 * (p1.x - p0.x) + 6 * it * t * (p2.x - p1.x) + 3 * t ** 2 * (p3.x - p2.x),
          y: 3 * it ** 2 * (p1.y - p0.y) + 6 * it * t * (p2.y - p1.y) + 3 * t ** 2 * (p3.y - p2.y),
        };
      }

      function extractTextFromPayload(message) {
        if (!message || !Array.isArray(message.content)) {
          return "";
        }
        return message.content
          .filter((part) => part && part.type === "text" && typeof part.text === "string")
          .map((part) => part.text)
          .join("");
      }

      function normalizeSessionKey(sessionKey) {
        return String(sessionKey || "").replace(/^agent:main:/, "");
      }

      function mergeDeltaText(current, delta) {
        if (!delta) {
          return current;
        }
        if (!current) {
          return delta;
        }
        if (delta.startsWith(current)) {
          return delta;
        }
        if (current.endsWith(delta)) {
          return current;
        }
        return current + delta;
      }

      function mergeFinalText(current, finalText) {
        if (!finalText) {
          return current;
        }
        if (!current) {
          return finalText;
        }
        if (finalText.startsWith(current)) {
          return finalText;
        }
        if (current.startsWith(finalText)) {
          return current;
        }
        return current + finalText;
      }

      function createId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function hashString(input) {
        let hash = 5381;
        for (let index = 0; index < input.length; index += 1) {
          hash = (hash * 33) ^ input.charCodeAt(index);
        }
        return String(hash >>> 0);
      }

      function snap(value) {
        return Math.round(value / GRID_SIZE) * GRID_SIZE;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function formatTimestamp(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        const hours = String(date.getHours()).padStart(2, "0");
        const minutes = String(date.getMinutes()).padStart(2, "0");
        const seconds = String(date.getSeconds()).padStart(2, "0");
        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
      }
      // Expose Meld internals for testing/debugging
      window.__meld = { state, gateway, propagateFromCard, getCard, requestAgentRun, scheduleSave };
    })();
    // Expose Meld internals for testing/debugging (added outside IIFE scope won't work, keep inside)
  </script>
</body>
